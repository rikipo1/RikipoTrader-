name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repo
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Staly keystore (pierwszy run tworzy i zapisuje w repo)
        run: |
          if [ ! -f signing/debug.keystore ]; then
            mkdir -p signing
            keytool -genkeypair -v -keystore signing/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Rikipo Trader,O=Rikipo,C=PL"
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add signing/debug.keystore
            git commit -m "ci: staly keystore (auto, nie usuwac)"
            git push
          fi
          mkdir -p $HOME/.android
          cp signing/debug.keystore $HOME/.android/debug.keystore

      - name: Projekt Capacitora
        run: |
          npm init -y
          npm i @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 @capacitor/local-notifications@6
          mkdir -p www
          cp index.html www/index.html
          npx cap add android
          npx cap sync android

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Przygotuj plik wyjsciowy
        run: cp android/app/build/outputs/apk/debug/app-debug.apk rikipo-trader.apk

      - name: Udostepnij APK jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: rikipo-trader-apk
          path: rikipo-trader.apk
          retention-days: 30
