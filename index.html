  const load = useCallback(async () => {
    const myReq = ++reqRef.current;
    const stale = () => !aliveRef.current || myReq !== reqRef.current;
    setLoading(true);
    try{
      const r = await getChart(item.sym, tf, prefs.source);
      if(stale()) return;
      setData({ candles:r.candles, price:r.price, prev:r.prev, demo:!!r.demo, live:!!r.live });
      setError(null);
      setUpdated(new Date());
    }catch(e){
      if(stale()) return;
      setError(e.message || 'Błąd pobierania');
    }
    if(!stale()) setLoading(false);
  }, [item.sym, tf.id, prefs.source]);

  useEffect(() => { setData({ candles:[], price:null, prev:null, demo:false }); setError(null); setFocus(null); setAiState({ busy:false, res:null, err:null, at:null, provider:null }); setBt({ busy:false, res:null }); prevDirRef.current = 0; load(); }, [load]);

  /* skróty klawiszowe (podgląd desktop): R = odśwież, A = przełącz AUTO */
  useEffect(() => {
    const onKey = (e) => {
      if(e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
      const k = (e.key || '').toLowerCase();
      if(k === 'r'){ Net.blockedUntil = 0; load(); Bus.show('Odświeżono (R)'); }
      else if(k === 'a'){ setPrefs(p => ({ ...p, auto:!p.auto })); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [load]);

  /* auto-odświeżanie co 15 s */
  useEffect(() => {
    if(!prefs.auto) return;
    const h = setInterval(() => {
      if(document.visibilityState === 'visible') load();
    }, 15000);
    return () => clearInterval(h);
  }, [prefs.auto, load]);

  /* Capital.com LIVE: WebSocket (płynny stream) + poll 3 s jako zapas */
  useEffect(() => {
    if(!prefs.auto) return;
    if(!CAP_MAP[item.sym]) return;
    let pollH = null;
    let stopped = false;
    const pending = { px:null };
    const applyTick = (px) => {
      if(!aliveRef.current) return;
      setData(d => {
        if(!d.candles.length || d.demo) return d;
        const cs = d.candles.slice();
        let last = Object.assign({}, cs[cs.length-1]);
        const step = TF_SEC[tf.id] || 300;
        const bStart = Math.floor(Date.now()/1000/step)*step;
        if(tf.id !== 'D1' && last.t < bStart){
          last = { t:bStart, o:px, h:px, l:px, c:px, v:0 };
          cs.push(last);
          if(cs.length > 900) cs.shift();
        } else {
          last.c = px;
          if(px > last.h) last.h = px;
          if(px < last.l) last.l = px;
          cs[cs.length-1] = last;
        }
        return Object.assign({}, d, { candles:cs, price:px, live:true });
      });
      setUpdated(new Date());
      resolveTick(item.sym, px);
    };
    const flushH = setInterval(() => {
      if(pending.px == null) return;
      const px = pending.px;
      pending.px = null;
      applyTick(px);
    }, 180);
    const onQuote = px => { pending.px = px; Net.last = 'Capital LIVE · stream'; };
    const startPoll = () => {
      if(pollH) return;
      pollH = setInterval(async () => {
        if(document.visibilityState !== 'visible' || !capEnabled()) return;
        try{
          const t = await capitalTick(item.sym);
          if(t){ pending.px = t.px; Net.last = 'Capital LIVE · poll 3s'; }
        }catch(e){}
      }, 3000);
    };
    if(capEnabled()){
      capResolveEpic(item.sym).then(epic => {
        if(stopped || !epic) { startPoll(); return; }
        capWsStart(epic, onQuote, ok => {
          if(ok){ if(pollH){ clearInterval(pollH); pollH = null; } }
          else startPoll();
        });
      }).catch(() => { if(!stopped) startPoll(); });
    }
    return () => {
      stopped = true;
      clearInterval(flushH);
      if(pollH) clearInterval(pollH);
      capWsStop();
    };
  }, [prefs.auto, item.sym, tf.id]);

  const closes = useMemo(() => data.candles.map(c => c.c), [data.candles]);
  const emaData = useMemo(() => {
    const out = {};
    for(let i=0;i<EMA_DEFS.length;i++){
      out[EMA_DEFS[i].n] = emaSeries(closes, EMA_DEFS[i].n);
    }
    return out;
  }, [closes]);
  const hasVol = useMemo(() => data.candles.some(c => c.v > 0), [data.candles]);

  /* Faza 2: pakiet wskaźników */
  const ind = useMemo(() => {
    const cs = data.candles;
    if(cs.length < 5) return null;
    const closesI = cs.map(c => c.c);
    const atr = atrSeries(cs, 14);
    let atrLast = null;
    for(let i=atr.length-1;i>=0;i--){ if(atr[i] != null){ atrLast = atr[i]; break; } }
    return {
      rsi: rsiSeries(closesI, 14),
      macd: macdSeries(closesI, 12, 26, 9),
      boll: bollSeries(closesI, 20, 2),
      stoch: stochSeries(cs, 14, 3, 3),
      adx: adxSeries(cs, 14),
      atr: atr,
      obv: hasVol ? obvSeries(cs) : null,
      vwap: (hasVol && tf.id !== 'D1') ? vwapSeries(cs) : null,
      sr: findSRZones(cs, atrLast),
    };
  }, [data.candles, hasVol, tf.id]);

  const iprefs = prefs.ind || { form:true, boll:false, vwap:false, sr:true, panels:['RSI'] };
  const overlays = useMemo(() => ({
    boll: (ind && iprefs.boll) ? ind.boll : null,
    vwap: (ind && iprefs.vwap) ? ind.vwap : null,
    sr:   (ind && iprefs.sr)   ? ind.sr   : null,
  }), [ind, iprefs.boll, iprefs.vwap, iprefs.sr]);

  const panels = useMemo(() => {
    if(!ind) return [];
    const list = [];
    (iprefs.panels || []).forEach(id => {
      if(id === 'RSI') list.push({ id, kind:'rsi', a:ind.rsi });
      else if(id === 'MACD') list.push({ id, kind:'macd', m:ind.macd.macd, s:ind.macd.signal, h:ind.macd.hist });
      else if(id === 'STOCH') list.push({ id, kind:'stoch', k:ind.stoch.k, d:ind.stoch.d });
      else if(id === 'ADX') list.push({ id, kind:'adx', adx:ind.adx.adx, pdi:ind.adx.pdi, mdi:ind.adx.mdi });
      else if(id === 'OBV' && ind.obv) list.push({ id, kind:'line', a:ind.obv, color:'#c792ff', fmt:(v) => (v < 0 ? '−' : '') + fmtVol(Math.abs(v)) });
      else if(id === 'ATR') list.push({ id, kind:'line', a:ind.atr, color:'#ffc94d' });
    });
    return list;
  }, [ind, iprefs.panels]);

  const toggleOverlay = key => {
    if(key === 'vwap'){
      if(tf.id === 'D1'){ Bus.show('VWAP działa na interwałach śróddziennych (M1–H1)'); return; }
      if(!hasVol){ Bus.show('VWAP wymaga wolumenu — ten instrument go nie podaje'); return; }
    }
    setPrefs(p => {
      const ip = p.ind || { form:true, boll:false, vwap:false, sr:true, panels:['RSI'] };
      return { ...p, ind:{ ...ip, [key]: !ip[key] } };
    });
  };
  const togglePanel = id => {
    if(id === 'OBV' && !hasVol){ Bus.show('OBV wymaga wolumenu — indeksy zwykle go nie podają'); return; }
    setPrefs(p => {
      const ip = p.ind || { form:true, boll:false, vwap:false, sr:true, panels:['RSI'] };
      const cur = ip.panels || [];
      let nx;
      if(cur.indexOf(id) !== -1){
        nx = cur.filter(x => x !== id);
      } else {
        nx = cur.concat([id]);
        if(nx.length > 2){
          nx = nx.slice(nx.length - 2);
          Bus.show('Maks. 2 panele naraz — najstarszy został wyłączony');
        }
      }
      return { ...p, ind:{ ...ip, panels:nx } };
    });
  };

  /* Faza 3: formacje */
  const patterns = useMemo(() => {
    if(!ind || data.candles.length < 20) return { list:[], markers:{}, geoDraw:[], patMap:{} };
    const r = detectPatterns(data.candles, ind.atr, emaData[20], hasVol);
    const patMap = {};
    r.list.forEach(p => { (patMap[p.i] = patMap[p.i] || []).push(p); });
    return { list:r.list, markers:r.markers, geoDraw:r.geoDraw, patMap };
  }, [ind, data.candles, emaData, hasVol]);
  const recentPat = useMemo(
    () => patterns.list.filter(p => p.i >= data.candles.length - 30).length,
    [patterns, data.candles.length]
  );

  /* Faza 4: sygnał confluence (z filtrem trendu wyższego interwału) */
  const signal = useMemo(() => {
    if(!ind || data.candles.length < 30) return null;
    const ht = htfTrend(data.candles, tf.id);
    const srWithHtf = (ind.sr || []).slice();
    srWithHtf.__htf = ht;
    srWithHtf.__minScore = (prefs.minScore != null ? prefs.minScore : 30);
    return computeSignal(data.candles, ind, emaData, patterns, hasVol, null, srWithHtf);
  }, [ind, data.candles, emaData, patterns, hasVol, tf.id, prefs.minScore]);
  const sigLevels = useMemo(() => {
    if(!signal || signal.dir === 0 || !signal.levels) return null;
    const L = signal.levels;
    return [
      { p: L.entry, label: 'ENTRY', color: '#cfe4e0' },
      { p: L.sl,    label: 'SL',    color: '#ff6b5e' },
      { p: L.tp1,   label: 'TP1',   color: '#2fd6ae' },
      { p: L.tp2,   label: 'TP2',   color: 'rgba(47,214,174,.65)' },
    ];
  }, [signal]);

  /* Faza 5: druga opinia AI */
  const runAi = async () => {
    const provider = ai.provider || 'claude';
    const key = provider === 'gemini' ? ai.keyGemini : ai.keyClaude;
    if(!key){ Bus.show('Najpierw wklej klucz API: INFO → Analiza AI'); return; }
    if(!ind || !signal || data.candles.length < 30){ Bus.show('Poczekaj na dane wykresu'); return; }
    setAiState(s => ({ ...s, busy:true, err:null }));
    const ctx = buildAiContext(item, tf, data.candles, ind, emaData, patterns, signal, hasVol);
    try{
      let txt;
      try{
        txt = provider === 'gemini'
          ? await callGemini(key, aiPrompt(ctx, !!ai.news), !!ai.news)
          : await callClaude(key, aiPrompt(ctx, !!ai.news), !!ai.news);
      }catch(e1){
        if(ai.news){
          txt = provider === 'gemini'
            ? await callGemini(key, aiPrompt(ctx, false), false)
            : await callClaude(key, aiPrompt(ctx, false), false);
        } else {
          throw e1;
        }
      }
      const res = tolerantJson(txt);
      setAiState({ busy:false, res, err:null, at:new Date(), provider });
    }catch(e){
      let msg = e.message || 'Błąd AI';
      if(msg.indexOf('429') !== -1) msg = 'Limit zapytań u dostawcy (429) — odczekaj minutę i spróbuj ponownie.';
      else if(msg.indexOf('401') !== -1 || msg.indexOf('403') !== -1) msg = 'Klucz API odrzucony (401/403) — sprawdź klucz w INFO → Analiza AI.';
      else if(msg.indexOf('timeout') !== -1) msg = 'Przekroczono czas oczekiwania — to środowisko może blokować API dostawcy (w APK i Chrome zadziała).';
      setAiState(s => ({ ...s, busy:false, err:msg }));
    }
  };
  const aiKeySet = (ai.provider || 'claude') === 'gemini' ? !!ai.keyGemini : !!ai.keyClaude;
  const aiRes = aiState.res;
  const aiVerdict = aiRes ? String(aiRes.verdict || 'WAIT').toUpperCase() : null;
  const aiVerdictCol = aiVerdict === 'LONG' ? 'var(--up)' : aiVerdict === 'SHORT' ? 'var(--down)' : 'var(--dim)';
  const engineDirTxt = signal ? (signal.dir > 0 ? 'LONG' : signal.dir < 0 ? 'SHORT' : 'WAIT') : null;
  const aiAgree = aiRes ? (typeof aiRes.agree_with_engine === 'boolean' ? aiRes.agree_with_engine : (aiVerdict === engineDirTxt)) : null;
  const aiRisks = (aiRes && Array.isArray(aiRes.key_risks)) ? aiRes.key_risks.slice(0, 3) : [];

  /* paper trading — pomocnicy */
  const makePaper = (dir, entry, sl, tp1, tp2, srcTag, score) => {
    const risk = Math.abs(entry - sl);
    return {
      id: Date.now(), ts: Date.now(), sym:item.sym, name:item.name, tf:tf.id,
      dir, entry, sl, tp1, tp2, risk,
      rr1: +(Math.abs(tp1 - entry) / Math.max(risk, 1e-9)).toFixed(2),
      result:'open', r:0, paper:true, src:(srcTag || 'manual'), score:(score != null ? score : null),
    };
  };
  const openTicket = (dir) => {
    if(!data.candles.length || data.demo){
      Bus.show(data.demo ? 'Paper trading działa na realnych danych — przełącz źródło z DEMO' : 'Poczekaj na dane');
      return;
    }
    const px = data.price != null ? data.price : data.candles[data.candles.length-1].c;
    let a = null;
    if(ind && ind.atr){
      for(let q=ind.atr.length-1;q>=0;q--){ if(ind.atr[q] != null){ a = ind.atr[q]; break; } }
    }
    if(!a) a = px * 0.004;
    let sl, tp1, tp2;
    if(signal && signal.dir === dir && signal.levels){
      sl = signal.levels.sl; tp1 = signal.levels.tp1; tp2 = signal.levels.tp2;
    } else {
      sl  = dir === 1 ? px - a*1.1  : px + a*1.1;
      tp1 = dir === 1 ? px + a*1.65 : px - a*1.65;
      tp2 = dir === 1 ? px + a*2.75 : px - a*2.75;
    }
    setTicket({ dir, entry:px, sl:fmtPrice(sl), tp1:fmtPrice(tp1), tp2:fmtPrice(tp2) });
  };

  /* Faza 6: alert przy nowym sygnale (przy włączonym AUTO) */
  useEffect(() => {
    if(!signal) return;
    const pd = prevDirRef.current;
    prevDirRef.current = signal.dir;
    if(signal.dir === 0 || signal.dir === pd) return;
    if(prefs.onlyStrong && !signal.strong) return;
    if(prefs.waitPullback && signal.entryQuality && signal.entryQuality.chase && !signal.strong) return;

    /* dedup + cooldown: nie powtarzaj tego samego kierunku, dopóki nie minie nowa świeca
       lub 5 min; chroni przed serią alertów gdy score piłuje wokół progu */
    const la = lastAlertRef.current;
    const nowMs = Date.now();
    const curBar = signal.t;
    const sameDir = la.dir === signal.dir;
    const sameBar = la.bar === curBar;
    const tooSoon = (nowMs - la.t) < 5*60*1000;
    if(sameDir && (sameBar || tooSoon)) return;
    lastAlertRef.current = { dir:signal.dir, t:nowMs, bar:curBar };

    const dtxt = signal.dir > 0 ? 'LONG' : 'SHORT';
    const strong = !!signal.strong;
    const htfTag = signal.htfDir && signal.htfDir === signal.dir ? ' ✓HTF' : '';
    const eq = signal.entryQuality;
    const eqTag = eq ? (eq.good ? ' ✓przy strefie' : eq.chase ? ' ⚠gonienie' : '') : '';
    const msg = (strong ? '★ ' : '') + item.sym + ' ' + tf.label + ': ' + dtxt
      + ' (' + (signal.score > 0 ? '+' : '') + signal.score + htfTag + eqTag + ')'
      + (signal.levels ? ' · SL ' + fmtPrice(signal.levels.sl) + ' · TP1 ' + fmtPrice(signal.levels.tp1) : '');
    if(prefs.alert){
      notifyUser('Rikipo Trader — ' + (strong ? 'MOCNY sygnał ' : 'sygnał ') + dtxt, msg);
      Bus.show((strong ? '🔥 ' : '⚡ ') + msg);
    }
    if(prefs.autoTrade && signal.levels && !journal.some(e => e.paper && e.result === 'open' && e.sym === item.sym)){
      addJournal(makePaper(signal.dir, signal.levels.entry, signal.levels.sl, signal.levels.tp1, signal.levels.tp2, 'auto', signal.score));
      Bus.show('🤖 AUTO-TRADE: otwarto ' + dtxt + ' (paper) @ ' + fmtPrice(signal.levels.entry));
    }
  }, [signal, prefs.alert, prefs.autoTrade, prefs.onlyStrong, prefs.waitPullback, item.sym, tf.label]);

  const lastT = data.candles.length ? data.candles[data.candles.length-1].t : null;
  const tfSecC = TF_SEC[tf.id] || 300;
  const ageSec = lastT ? (Date.now()/1000 - lastT) : null;
  const delayed = !data.demo && ageSec != null && ageSec > tfSecC*2 + 90;
  const pct = (data.price != null && data.prev) ? (data.price - data.prev) / data.prev * 100 : null;
  const chg = (data.price != null && data.prev != null) ? data.price - data.prev : null;
  const up = pct != null && pct >= 0;
  const priceColor = pct == null ? 'var(--text)' : up ? 'var(--up)' : 'var(--down)';

  return (
    <div className="screen" style={{overflow:'hidden'}}>
      <div className="topbar" style={{paddingBottom:4}}>
        <button className="iconbtn" onClick={onBack}><Ic d={IC.back} size={20} /></button>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:800, fontSize:15, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{item.name}</div>
          <div className="wl-sym mono">{item.sym} · {tf.label} · zakres {tf.range}</div>
        </div>
        <div className="spacer" />
        <button className={'iconbtn' + (prefs.autoTrade ? ' on' : '')}
          onClick={() => setPrefs(p => {
            const nv = !p.autoTrade;
            Bus.show(nv ? '🤖 AUTO-TRADE (paper) WŁĄCZONE — bot otworzy wirtualną pozycję przy nowym sygnale' : 'AUTO-TRADE wyłączone');
            return { ...p, autoTrade:nv };
          })}>
          <span style={{fontSize:16, lineHeight:1}}>🤖</span>
        </button>
        <button className={'iconbtn' + (prefs.alert ? ' on' : '')}
          onClick={() => setPrefs(p => {
            const nv = !p.alert;
            if(nv) notifyUser('Rikipo Trader', 'Alerty sygnałów aktywne — ' + item.sym);
            Bus.show(nv ? 'Alerty sygnałów WŁĄCZONE — działają przy AUTO 15s' : 'Alerty sygnałów wyłączone');
            return { ...p, alert:nv };
          })}>
          <Ic d={IC.bell} size={18} />
        </button>
        <button className={'chip mono' + (prefs.auto ? ' sel' : '')}
          style={prefs.auto ? {color:'var(--up)', borderColor:'rgba(47,214,174,.4)'} : null}
          onClick={() => setPrefs(p => ({ ...p, auto:!p.auto }))}>
          {prefs.auto ? '● AUTO 15s' : '○ AUTO'}
        </button>
        <button className="iconbtn" onClick={() => { Net.blockedUntil = 0; load(); }}>
          <span className={loading ? 'spin' : ''} style={{display:'flex'}}><Ic d={IC.refresh} size={18} /></span>
        </button>
      </div>

      <div className="pricehero">
        <div className="ph-price mono" style={{color:priceColor}}>
          {fmtPrice(data.price)}
          {pct != null && (
            <span className={'wl-chip mono ' + (up ? 'chip-up' : 'chip-down')}
              style={{fontSize:13, verticalAlign:'middle', marginLeft:10}}>
              {(chg >= 0 ? '+' : '') + fmtPrice(chg)} · {fmtPct(pct)}
            </span>
          )}
        </div>
        <div className="ph-sub mono">
          {data.live && !data.demo ? <span style={{color:'var(--up)', fontWeight:800, animation:'pulse 1.6s infinite'}}>● LIVE&nbsp;·&nbsp;</span> : null}
          {data.demo ? <span style={{color:'var(--ema9)', fontWeight:800}}>DEMO&nbsp;·&nbsp;</span> : null}
          {updated ? 'akt. ' + fmtClock(updated) : '…'} · źródło: {error && !data.candles.length ? '—' : Net.last}
          {loading ? <span style={{color:'var(--accent)', animation:'pulse 1s infinite'}}> ●</span> : null}
          {error && data.candles.length ? <span style={{color:'var(--ema9)'}}> · offline — ostatnie dane</span> : null}
          {delayed ? <span style={{color:'var(--ema9)'}}>{' · świeca sprzed ' + Math.round(ageSec/60) + ' min (darmowe indeksy ≈15 min opóźnienia — LIVE: Capital.com w INFO)'}</span> : null}
        </div>
      </div>

      {delayed && !capEnabled() && CAP_MAP[item.sym] && (
        <div style={{
          margin:'2px 16px 0', padding:'8px 11px', borderRadius:10,
          background:'rgba(255,201,77,.10)', border:'1px solid rgba(255,201,77,.35)',
          fontSize:11.5, color:'var(--ema9)', lineHeight:1.5, display:'flex', alignItems:'center', gap:8,
        }}>
          <span style={{fontSize:15}}>⏱</span>
          <span>Dane opóźnione o ~15 min (darmowy feed indeksów). Włącz LIVE z Capital.com w zakładce INFO, by widzieć notowania w czasie rzeczywistym jak w XTB.</span>
        </div>
      )}

      <div className="chiprow">
        {TFS.map(t => (
          <button key={t.id} className={'chip mono' + (t.id === tf.id ? ' sel' : '')}
            onClick={() => setPrefs(p => ({ ...p, tf:t.id }))}>{t.label}</button>
        ))}
      </div>
      <div className="chiprow" style={{paddingTop:0}}>
        {EMA_DEFS.map(d => (
          <button key={d.n}
            className={'chip mono' + (prefs.emaVis[d.n] ? ' sel' : ' off')}
            onClick={() => setPrefs(p => ({ ...p, emaVis:{ ...p.emaVis, [d.n]: !p.emaVis[d.n] } }))}>
            <span className="dot" style={{background:d.color}} />EMA {d.n}
          </button>
        ))}
      </div>
      <div className="chiprow" style={{paddingTop:0}}>
        <button className="chip mono" style={{color:'var(--accent)', borderColor:'rgba(255,138,117,.35)'}}
          onClick={() => setShowPat(true)}>≡ FORMACJE{recentPat ? ' · ' + recentPat : ''}</button>
        <button className="chip mono" style={{color:'var(--cyan)', borderColor:'rgba(79,216,255,.35)'}}
          onClick={() => setShowAi(true)}>✦ AI</button>
        <button className="chip mono" style={{color:'var(--ema9)', borderColor:'rgba(255,201,77,.35)'}}
          onClick={() => setShowBt(true)}>⟲ BACKTEST</button>
        {[['form','ZNACZNIKI'],['boll','BB'],['vwap','VWAP'],['sr','S/R']].map(([k, l]) => (
          <button key={k} className={'chip mono' + (iprefs[k] ? ' sel' : ' off')}
            onClick={() => toggleOverlay(k)}>{l}</button>
        ))}
        <span style={{width:1, alignSelf:'stretch', background:'var(--border2)', margin:'2px 4px', flexShrink:0}} />
        {['RSI','MACD','STOCH','ADX','OBV','ATR'].map(id => (
          <button key={id} className={'chip mono' + ((iprefs.panels || []).indexOf(id) !== -1 ? ' sel' : ' off')}
            onClick={() => togglePanel(id)}>{id}</button>
        ))}
      </div>

      {signal && (
        <button className="sigstrip" onClick={() => setShowSig(true)}
          style={{
            borderColor: signal.dir > 0 ? 'rgba(47,214,174,.45)' : signal.dir < 0 ? 'rgba(255,107,94,.45)' : 'var(--border2)',
            background: signal.dir > 0 ? 'rgba(47,214,174,.07)' : signal.dir < 0 ? 'rgba(255,107,94,.07)' : 'var(--panel)',
          }}>
          <span className="sig-dir" style={{color: signal.dir > 0 ? '#2fd6ae' : signal.dir < 0 ? '#ff6b5e' : '#8fb0ac'}}>
            {signal.dir > 0 ? 'LONG' : signal.dir < 0 ? 'SHORT' : 'CZEKAJ'}{signal.strong ? ' ★' : ''}
          </span>
          <span className="sgauge">
            <i style={{width: Math.min(100, Math.abs(signal.score)) + '%',
              background: signal.dir > 0 ? '#2fd6ae' : signal.dir < 0 ? '#ff6b5e' : '#8fb0ac'}} />
          </span>
          <span className="sig-meta mono" style={{color:'var(--dim)'}}>
            {'confluence ' + (signal.score > 0 ? '+' : '') + signal.score}
            <br/>
            {signal.dir !== 0 && signal.levels
              ? 'SL ' + fmtPrice(signal.levels.sl) + ' · TP1 ' + fmtPrice(signal.levels.tp1)
              : 'próg sygnału: ±' + (prefs.minScore != null ? prefs.minScore : 30)}
          </span>
          {signal.dir !== 0 && signal.entryQuality && (
            <span className="mono" style={{
              fontSize:10.5, fontWeight:800, padding:'2px 6px', borderRadius:6, whiteSpace:'nowrap',
              color: signal.entryQuality.good ? '#2fd6ae' : signal.entryQuality.chase ? '#ff8a75' : '#8fb0ac',
              background: signal.entryQuality.good ? 'rgba(47,214,174,.12)' : signal.entryQuality.chase ? 'rgba(255,138,117,.12)' : 'rgba(143,176,172,.10)',
              border: '1px solid ' + (signal.entryQuality.good ? 'rgba(47,214,174,.35)' : signal.entryQuality.chase ? 'rgba(255,138,117,.35)' : 'rgba(143,176,172,.25)'),
            }}>
              {signal.entryQuality.good ? '✓ przy ' + signal.entryQuality.anchor
                : signal.entryQuality.chase ? '⚠ ' + signal.entryQuality.dist + '×ATR od ' + signal.entryQuality.anchor
                : '• ' + signal.entryQuality.dist + '×ATR'}
            </span>
          )}
          {signal.warns.length > 0 && <span style={{color:'var(--ema9)', fontSize:15}}>⚠</span>}
        </button>
      )}

      {data.candles.length > 0 && !data.demo && (
        <div style={{display:'flex', gap:8, margin:'4px 16px 2px'}}>
          <button className="chip mono" style={{flex:1, justifyContent:'center', padding:'10px 0', fontWeight:800, color:'var(--up)', borderColor:'rgba(47,214,174,.5)', background:'rgba(47,214,174,.08)'}}
            onClick={() => openTicket(1)}>▲ KUP · paper</button>
          <button className="chip mono" style={{flex:1, justifyContent:'center', padding:'10px 0', fontWeight:800, color:'var(--down)', borderColor:'rgba(255,107,94,.5)', background:'rgba(255,107,94,.08)'}}
            onClick={() => openTicket(-1)}>▼ SPRZEDAJ · paper</button>
        </div>
      )}

      <div style={{flex:1, display:'flex', flexDirection:'column', position:'relative', minHeight:280}}>
        <ChartCanvas
          key={item.sym + '|' + tf.id}
          candles={data.candles}
          emaData={emaData}
          emaVis={prefs.emaVis}
          tfId={tf.id}
          hasVol={hasVol}
          overlays={overlays}
          panels={panels}
          markers={iprefs.form ? patterns.markers : null}
          geoLines={iprefs.form ? patterns.geoDraw : null}
          patMap={patterns.patMap}
          focus={focus}
          levels={sigLevels}
          resetKey={item.sym + '|' + tf.id}
        />
        {loading && !data.candles.length && (
          <div className="overlaymsg"><div className="loader" /><div style={{color:'var(--dim)', fontSize:13}}>Pobieram świece {tf.label}…</div></div>
        )}
        {error && !data.candles.length && !loading && (
          <div className="overlaymsg">
            <div style={{fontWeight:800, color:'var(--down)'}}>Nie udało się pobrać danych</div>
            <div style={{color:'var(--dim)', fontSize:12.5, maxWidth:280}}>{error}</div>
            <div style={{display:'flex', gap:10}}>
              <button className="chip sel" onClick={() => { Net.blockedUntil = 0; load(); }}>Spróbuj ponownie</button>

                      {bt.res.trades.slice(-8).reverse().map((t, k) => (
                        <div key={k} className="kv" style={{fontSize:12}}>

                            {(t.dir > 0 ? '▲ ' : '▼ ') + (data.candles[t.i0] ? fmtFull(data.candles[t.i0].t, tf.id) : '')}
                          </b>
                          <span className="mono" style={{color: t.r > 0 ? 'var(--up)' : t.r < 0 ? 'var(--down)' : 'var(--dim)'}}>
                            {t.out + ' ' + (t.r > 0 ? '+' : '') + t.r + 'R'}
                          </span>
                        </div>
                      ))}
                    </React.Fragment>
                  )}
                  <div style={{marginTop:12, fontSize:11, color:'var(--dim2)', lineHeight:1.65}}>
                    Metodologia: wejście po close świecy sygnału · wyjście w całości na TP1 (+1.5R) lub SL (−1R) ·
                    trafność liczona wyłącznie z transakcji zamkniętych na TP/SL (timeouty pominięte) ·
                    SL i TP w tej samej świecy = liczony SL (pesymistycznie) · po 60 świecach wyjście po close ·
                    5 świec przerwy między transakcjami · strefy S/R liczone przyczynowo (bez zaglądania w przyszłość) ·
                    formacje geometryczne pominięte · bez spreadu i poślizgu — realny wynik na CFD będzie gorszy ·
                    historia nie gwarantuje przyszłości.
                  </div>
                </div>
              )}
              {!bt.res && !bt.busy && (
                <div style={{fontSize:12, color:'var(--dim2)', lineHeight:1.7, padding:'10px 2px'}}>
                  Backtest przepuszcza silnik sygnałów przez całą załadowaną historię

                  Odpowiada na pytanie: czy ten setup miał tu w ogóle przewagę.
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ====================== [5c] EKRAN: DZIENNIK ======================== */
function MiniLiveChart({ entry }){
  const wrapRef = useRef(null);
  const cvsRef = useRef(null);
  const [candles, setCandles] = useState([]);
  const [live, setLive] = useState(null);
  const [size, setSize] = useState({ w:0, h:170 });
  const aliveRef = useRef(true);
  const isOpen = entry.result === 'open';

  useEffect(() => () => { aliveRef.current = false; }, []);

  /* rozmiar */
  useEffect(() => {
    const el = wrapRef.current;
    if(!el || !window.ResizeObserver) return;
    const ro = new ResizeObserver(es => setSize(s => ({ ...s, w:Math.round(es[0].contentRect.width) })));
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  /* wczytaj świece wokół wejścia + odświeżaj gdy otwarta */
  const tfObj = useMemo(() => TFS.find(t => t.id === entry.tf) || { id:'M5', interval:'5m', range:'1d' }, [entry.tf]);
  const load = useCallback(async () => {
    try{
      const r = await fetchChart(entry.sym, tfObj);
      if(!aliveRef.current) return;
      setCandles(r.candles);
      if(isOpen) setLive(r.price);
    }catch(e){}
  }, [entry.sym, tfObj, isOpen]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    if(!isOpen) return;
    const epic = CAP_MAP[entry.sym];
    let h;
    if(epic && capEnabled()){
      h = setInterval(async () => {
        if(document.visibilityState !== 'visible') return;
        try{ const t = await capitalTick(entry.sym); if(t && aliveRef.current) setLive(t.px); }catch(e){}
      }, 3000);
    } else {
      h = setInterval(load, 15000);
    }
    return () => clearInterval(h);
  }, [isOpen, entry.sym, load]);

  /* rysowanie */
  useEffect(() => {
    const cvs = cvsRef.current;
    if(!cvs || !size.w) return;
    const H = size.h, W = size.w, dpr = window.devicePixelRatio || 1;
    cvs.width = W*dpr; cvs.height = H*dpr;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    const ctx = cvs.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#04181d';
    ctx.fillRect(0, 0, W, H);
    if(!candles.length) return;

    /* okno: od ~8 świec przed wejściem do teraz (lub do zamknięcia) */
    let i0 = 0;
    for(let q=0;q<candles.length;q++){ if(candles[q].t*1000 >= entry.ts){ i0 = q; break; } if(q === candles.length-1) i0 = q; }
    i0 = Math.max(0, i0 - 8);
    let i1 = candles.length - 1;
    if(!isOpen && entry.exitTs){
      for(let q=candles.length-1;q>=0;q--){ if(candles[q].t*1000 <= entry.exitTs){ i1 = Math.min(candles.length-1, q + 3); break; } }
    }
    const view = candles.slice(i0, i1 + 1);
    if(!view.length) return;

    const axW = 52, padT = 8, padB = 8;
    const plotR = W - axW, plotL = 4, plotW = plotR - plotL;
    const ph = H - padT - padB;

    let lo = Infinity, hi = -Infinity;
    for(let q=0;q<view.length;q++){ if(view[q].l < lo) lo = view[q].l; if(view[q].h > hi) hi = view[q].h; }
    [entry.entry, entry.sl, entry.tp1, entry.tp2, live].forEach(p => {
      if(p == null) return; if(p < lo) lo = p; if(p > hi) hi = p;
    });
    const pad = (hi - lo) * 0.08 || 1;
    lo -= pad; hi += pad;
    const rng = hi - lo;
    const cw = plotW / view.length;
    const bw = Math.min(14, Math.max(1.5, cw * 0.6));
    const X = q => plotL + q*cw + cw/2;
    const Y = p => padT + (hi - p)/rng * ph;

    /* linie poziomów */
    const lvl = (p, col, label) => {
      if(p == null || p < lo || p > hi) return;
      const y = Y(p);
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      ctx.fillStyle = col;
      ctx.fillText(label + ' ' + fmtPrice(p), plotR + 3, y);
    };
    lvl(entry.sl, '#ff6b5e', 'SL');
    lvl(entry.tp1, '#2fd6ae', 'TP1');
    if(entry.tp2 != null) lvl(entry.tp2, 'rgba(47,214,174,.6)', 'TP2');
    lvl(entry.entry, '#cfe4e0', 'E');

    /* świece */
    for(let q=0;q<view.length;q++){
      const c = view[q], up = c.c >= c.o, col = up ? '#2fd6ae' : '#ff6b5e';
      const x = X(q);
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, Y(c.h)); ctx.lineTo(x, Y(c.l)); ctx.stroke();
      const yO = Y(c.o), yC = Y(c.c);
      ctx.fillStyle = col;
      ctx.fillRect(x - bw/2, Math.min(yO, yC), bw, Math.max(1, Math.abs(yO - yC)));
    }

    /* znacznik wejścia (pionowa kreska na świecy wejścia) */
    let entryQ = -1;
    for(let q=0;q<view.length;q++){ if(view[q].t*1000 >= entry.ts){ entryQ = q; break; } }
    if(entryQ >= 0){
      const x = X(entryQ);
      ctx.strokeStyle = 'rgba(207,228,224,.35)'; ctx.lineWidth = 1;
      ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, H - padB); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = entry.dir > 0 ? '#2fd6ae' : '#ff6b5e';
      const ay = Y(entry.entry);
      ctx.beginPath();
      if(entry.dir > 0){ ctx.moveTo(x, ay+8); ctx.lineTo(x-4, ay+14); ctx.lineTo(x+4, ay+14); }
      else { ctx.moveTo(x, ay-8); ctx.lineTo(x-4, ay-14); ctx.lineTo(x+4, ay-14); }
      ctx.closePath(); ctx.fill();
    }

    /* znacznik zamknięcia */
    if(!isOpen && entry.exit != null){
      let exitQ = view.length - 1;
      if(entry.exitTs){
        for(let q=0;q<view.length;q++){ if(view[q].t*1000 >= entry.exitTs){ exitQ = q; break; } }
      }
      const x = X(exitQ), y = Y(entry.exit);
      const win = (entry.r || 0) > 0;
      ctx.fillStyle = win ? '#2fd6ae' : '#ff6b5e';
      ctx.beginPath(); ctx.arc(x, y, 4.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#04181d'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.fillStyle = win ? '#2fd6ae' : '#ff6b5e';
      ctx.textAlign = x > W/2 ? 'right' : 'left';
      ctx.textBaseline = 'bottom';
      const lbl = (entry.result === 'tp2' ? 'TP2' : entry.result === 'tp1' ? 'TP1' : entry.result === 'sl' ? 'SL' : 'EXIT')
        + ' ' + ((entry.r||0) > 0 ? '+' : '') + (entry.r||0) + 'R';
      ctx.fillText(lbl, x > W/2 ? x - 7 : x + 7, y - 5);
    }

    /* linia + etykieta LIVE */
    if(isOpen && live != null && live >= lo && live <= hi){
      const y = Y(live);
      ctx.strokeStyle = '#4fd8ff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
      ctx.fillStyle = '#4fd8ff';
      ctx.fillRect(plotR, y - 7, axW, 14);
      ctx.fillStyle = '#04181d';
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(fmtPrice(live), plotR + 3, y);
    }
  }, [candles, live, size, entry, isOpen]);

  const floating = isOpen ? paperFloating(entry, live) : null;

  return (
    <div style={{padding:'2px 4px 8px'}}>
      <div ref={wrapRef} style={{width:'100%'}}>
        <canvas ref={cvsRef} style={{display:'block', borderRadius:8}} />
      </div>
      <div className="mono" style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--dim2)', marginTop:5}}>
        <span>{entry.tf} · {candles.length ? 'wykres wokół wejścia' : 'ładuję…'}</span>
        {isOpen
          ? <span style={{color: floating == null ? 'var(--dim)' : floating >= 0 ? 'var(--up)' : 'var(--down)', fontWeight:700}}>
              {live != null ? 'LIVE ' + fmtPrice(live) + (floating != null ? '  ·  ' + (floating > 0 ? '+' : '') + floating + 'R' : '') : '…'}
            </span>
          : <span style={{color: (entry.r||0) > 0 ? 'var(--up)' : 'var(--down)', fontWeight:700}}>
              zamknięto: {(entry.r||0) > 0 ? '+' : ''}{entry.r||0}R
            </span>}
      </div>
    </div>
  );
}

function EquityLine({ data }){
  const ref = useRef(null);
  const wrap = useRef(null);
  useEffect(() => {
    const cvs = ref.current, el = wrap.current;
    if(!cvs || !el || !data || data.length < 2) return;
    const W = el.clientWidth || 280, H = 84, dpr = window.devicePixelRatio || 1;
    cvs.width = W*dpr; cvs.height = H*dpr;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    const ctx = cvs.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    let lo = Infinity, hi = -Infinity;
    for(let q=0;q<data.length;q++){ if(data[q] < lo) lo = data[q]; if(data[q] > hi) hi = data[q]; }
    if(hi - lo < 0.5){ hi += 0.5; lo -= 0.5; }
    const x = q => 4 + q/(data.length-1)*(W-8);
    const y = v => 6 + (hi - v)/(hi - lo)*(H-12);
    if(0 >= lo && 0 <= hi){
      ctx.strokeStyle = 'rgba(143,176,172,.35)'; ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(4, y(0)); ctx.lineTo(W-4, y(0)); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.strokeStyle = data[data.length-1] >= 0 ? '#2fd6ae' : '#ff6b5e';
    ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
    ctx.beginPath();
    for(let q=0;q<data.length;q++){
      if(q === 0) ctx.moveTo(x(q), y(data[q]));
      else ctx.lineTo(x(q), y(data[q]));
    }
    ctx.stroke();
  }, [data]);
  return <div ref={wrap} style={{width:'100%'}}><canvas ref={ref} /></div>;
}

function fmtDT(ts){
  const d = new Date(ts);
  return pad2(d.getDate()) + '.' + pad2(d.getMonth()+1) + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}

];

              <input value={mNote} onChange={e => setMNote(e.target.value)} placeholder="Notatka (opcjonalnie)" />
            </div>
            <button className="chip sel mono" style={{width:'100%', justifyContent:'center', padding:'12px', fontSize:14}}
              onClick={addManual}>Zapisz wpis</button>
          </div>
        </div>
      )}
    </div>
  );
}

          <button className={'chip mono' + (prefs.waitPullback ? ' sel' : ' off')}

            onClick={() => setPrefs(p => {

          <button className="chip sel mono" style={{flex:1, justifyContent:'center', padding:'11px'}}

              try{
                const dump = {
                  __app:'RikipoTrader', __type:'backup', __ver:1, __ts:new Date().toISOString(),
                  ai, cap, prefs, wl, journal,
                };
                const json = JSON.stringify(dump, null, 2);
                const fname = 'rikipo-trader-backup-' + new Date().toISOString().slice(0,10) + '.json';
                const Cap = window.Capacitor && window.Capacitor.Plugins;
                if(Cap && Cap.Filesystem){
                  const res = await Cap.Filesystem.writeFile({
                    path: fname, data: json, directory:'DOCUMENTS', encoding:'utf8', recursive:true,
                  });
                  let shared = false;
                  if(Cap.Share && res && res.uri){
                    try{ await Cap.Share.share({ title:'Kopia Rikipo Trader', url:res.uri }); shared = true; }catch(e){}
                  }
                  setBackupMsg('✓ Zapisano do Dokumentów: ' + fname + (shared ? ' (otwarto udostępnianie)' : ''));
                } else {
                  const blob = new Blob([json], { type:'application/json' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url; a.download = fname; document.body.appendChild(a); a.click();
                  document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(url), 4000);
                  setBackupMsg('✓ Pobrano plik: ' + fname);
                }
                Bus.show('💾 Kopia zapasowa utworzona');
              }catch(e){
                setBackupMsg('✗ Błąd zapisu: ' + (e.message || e));
              }
            }}>💾 Zapisz kopię</button>
          <button className="chip mono" style={{flex:1, justifyContent:'center', padding:'11px'}}
            onClick={() => { if(fileInputRef.current) fileInputRef.current.click(); }}>📂 Wczytaj kopię</button>
        </div>
        <input ref={fileInputRef} type="file" accept="application/json,.json" style={{display:'none'}}
          onChange={e => {
            const f = e.target.files && e.target.files[0];
            if(!f) return;
            const reader = new FileReader();
            reader.onload = () => {
              try{
                const d = JSON.parse(String(reader.result || ''));
                if(!d || d.__app !== 'RikipoTrader'){ setBackupMsg('✗ To nie jest plik kopii Rikipo Trader.'); return; }
                let restored = [];
                if(d.ai && typeof d.ai === 'object'){ setAi(a => ({ ...a, ...d.ai })); restored.push('klucze AI'); }
                if(d.cap && typeof d.cap === 'object'){ setCap(c => ({ ...c, ...d.cap })); restored.push('Capital.com'); }
                if(d.prefs && typeof d.prefs === 'object'){ setPrefs(p => ({ ...p, ...d.prefs, emaVis:{ ...p.emaVis, ...(d.prefs.emaVis || {}) }, ind:{ ...p.ind, ...(d.prefs.ind || {}) } })); restored.push('ustawienia'); }
                if(Array.isArray(d.wl) && d.wl.length){ setWl(() => d.wl); restored.push('lista (' + d.wl.length + ')'); }
                if(Array.isArray(d.journal)){ setJournal(() => d.journal); restored.push('dziennik (' + d.journal.length + ')'); }
                setBackupMsg('✓ Wczytano: ' + (restored.join(', ') || 'brak danych') + '. Data kopii: ' + (d.__ts ? String(d.__ts).slice(0,16).replace('T',' ') : '—'));
                Bus.show('📂 Kopia wczytana — ' + restored.join(', '));
              }catch(err){
                setBackupMsg('✗ Nie udało się odczytać pliku: ' + (err.message || err));
              }
            };
            reader.onerror = () => setBackupMsg('✗ Błąd odczytu pliku.');
            reader.readAsText(f);
            e.target.value = '';
          }} />

          <div style={{fontSize:12.5, lineHeight:1.6, marginBottom:8, color: backupMsg[0] === '✓' ? 'var(--up)' : 'var(--down)'}}>{backupMsg}</div>

          kliny, kanały, flagi, chorągiewki). Każda ma confidence 0–100%
          liczone z kontekstu trendu, wielkości świec i wolumenu.
          Znaczniki ▲▼ na wykresie (przełącznik ZNACZNIKI), linie formacji
          geometrycznych rysowane automatycznie, pełna lista pod ≡ FORMACJE.
        </div>
      </div>

      <div className="card">
        <h3>Obsługa wykresu</h3>
        <div style={{fontSize:13, color:'var(--dim)', lineHeight:1.8}}>
          Przesuń palcem — przewijanie historii. Uszczypnij — zoom.
          Tapnij świecę — krzyżyk z OHLC i wartościami EMA (tapnij ponownie, by ukryć).
          Przycisk „⇥ Teraz" wraca do najnowszej świecy. Na komputerze: kółko myszy = zoom, dwuklik = reset.
        </div>
      </div>

      <div className="card">
        <h3>Dane</h3>
        <div style={{fontSize:13, color:'var(--dim)', lineHeight:1.8}}>
          Notowania: Yahoo Finance — uwaga: indeksy (DAX, Dow) mają tam ~15 minut opóźnienia z licencji giełdowych; akcje US, forex i krypto są niemal na bieżąco. Prawdziwy czas rzeczywisty daje LIVE przez Capital.com (karta wyżej).
          Indeksy kasowe DAX i Dow Jones odpowiadają instrumentom DE40 / US30 w XTB —
          różnice wynikają ze spreadu i kontraktu CFD.
          W Chrome dane idą przez publiczne proxy CORS, które mają limity zapytań —
          stąd możliwe chwilowe przerwy; aplikacja trzyma wtedy ostatnie notowania
          z pamięci podręcznej (do 10 min). Pełną stabilność daje wersja APK,
          gdzie dane pobiera natywny HTTP bez żadnych proxy. Dla interwału D1 działa też zapasowe źródło (Stooq), włączane automatycznie, gdy Yahoo nie odpowiada.
        </div>
      </div>

      <div className="card">
        <h3>Źródło danych</h3>
        <div style={{display:'flex', gap:8, marginBottom:9}}>
          {[['auto','AUTO'],['real','REAL'],['demo','DEMO']].map(([v,l]) => (
            <button key={v} className={'chip mono' + ((prefs.source || 'auto') === v ? ' sel' : '')}
              onClick={() => { Net.blockedUntil = 0; setPrefs(p => ({ ...p, source:v })); }}>{l}</button>
          ))}
        </div>
        <div style={{fontSize:12.5, color:'var(--dim)', lineHeight:1.7}}>
          AUTO — realne notowania, przy braku sieci symulacja.
          REAL — tylko realne dane (przy braku sieci pokaże błąd).
          DEMO — zawsze symulacja, do testów offline.
          Przełącznik jest też na górze listy Rynki.
        </div>
      </div>

      <div className="card">
        <h3>Tryb DEMO</h3>
        <div style={{fontSize:13, color:'var(--dim)', lineHeight:1.8}}>
          Podgląd plików w aplikacji Claude działa w piaskownicy blokującej
          zewnętrzne API — wtedy Rikipo Trader automatycznie przełącza się na
          symulowane świece (oznaczenie DEMO) i „dogenerowuje" nowe przy AUTO 15s,
          więc możesz w pełni testować wykres, gesty i EMA.
          Realne notowania: aplikacja APK (natywny HTTP) albo plik otwarty w Chrome.
        </div>
      </div>

      <div className="card" style={{borderColor:'rgba(255,138,117,.25)'}}>
        <h3 style={{color:'var(--accent)'}}>Zastrzeżenie</h3>
        <div style={{fontSize:12.5, color:'var(--dim)', lineHeight:1.7}}>
          Rikipo Trader to prywatne narzędzie analityczno-edukacyjne.
          Nie stanowi porady inwestycyjnej. Handel CFD wiąże się z wysokim ryzykiem utraty kapitału.
        </div>
      </div>

      <div style={{textAlign:'center', padding:'10px 0 22px', fontSize:10.5, color:'var(--dim2)'}} className="mono">
        Rikipo Trader v1.3.3 · auto-epic + diag · motyw Baltic Dawn
      </div>
    </div>
  );
}

/* ============================ [6] APP =============================== */
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state = { err:null }; }
  static getDerivedStateFromError(e){ return { err:e }; }
  render(){
    if(this.state.err){
      return (
        <div style={{padding:'60px 26px', textAlign:'center'}}>
          <div style={{fontWeight:900, fontSize:18, marginBottom:8}}>Ups — błąd aplikacji</div>
          <div style={{color:'var(--dim)', fontSize:13, marginBottom:18}}>{String(this.state.err && this.state.err.message || this.state.err)}</div>
          <button className="chip sel" onClick={() => location.reload()}>Uruchom ponownie</button>
        </div>
      );
    }
    return this.props.children;
  }
}

const DEFAULT_PREFS = { tf:'M5', emaVis:{ 9:true, 20:true, 50:true, 200:false }, auto:false, alert:false, autoTrade:false, bgScan:false, onlyStrong:false, waitPullback:false, minScore:30, source:'auto', ind:{ form:true, boll:false, vwap:false, sr:true, panels:['RSI'] } };

function App(){
  const [wl, setWlState] = useState(() => Store.get('rt_wl_v1', DEFAULT_WL));
  const [prefs, setPrefsState] = useState(() => {
    const p = Store.get('rt_prefs_v1', DEFAULT_PREFS);
    return {
      ...DEFAULT_PREFS, ...p,
      emaVis:{ ...DEFAULT_PREFS.emaVis, ...(p.emaVis || {}) },
      ind:{
        ...DEFAULT_PREFS.ind,
        ...((p && p.ind) || {}),
        panels: (p && p.ind && p.ind.panels) ? p.ind.panels : DEFAULT_PREFS.ind.panels.slice(),
      },
    };
  });
  const [ai, setAiRaw] = useState(() => Object.assign({ provider:'claude', keyClaude:'', keyGemini:'', news:true }, Store.get('rt_ai_v1', {})));
  const [active, setActive] = useState(() => Store.get('rt_last', null));
  const [screen, setScreen] = useState(() => Store.get('rt_last', null) ? 'chart' : 'list');
  const [toast, setToast] = useState(null);

  useEffect(() => { Store.set('rt_wl_v1', wl); }, [wl]);
  useEffect(() => { Store.set('rt_prefs_v1', prefs); }, [prefs]);
  useEffect(() => { Store.set('rt_ai_v1', ai); }, [ai]);
  const [journal, setJournal] = useState(() => Store.get('rt_journal_v1', []));
  useEffect(() => { Store.set('rt_journal_v1', journal); }, [journal]);
  const [cap, setCap] = useState(() => Object.assign({ on:false, demo:false, key:'', id:'', pass:'' }, Store.get('rt_cap_v1', {})));
  useEffect(() => {
    Store.set('rt_cap_v1', cap);
    Object.assign(CapCfg, cap);
    CapSess.cst = null; CapSess.at = 0; CapSess.acctSet = false;
    capWarned = false;
  }, [cap]);
  useEffect(() => {
    Bus.fn = (m) => {
      setToast(m);
      setTimeout(() => setToast(null), 2800);
    };
    return () => { Bus.fn = null; };
  }, []);

  const setWl = (fn) => setWlState(fn);
  const setPrefs = (fn) => setPrefsState(fn);
  const setAi = (fn) => setAiRaw(fn);
  const addJournal = (e) => setJournal(list => [e, ...list]);
  const paperNote = (e) => {
    const msg = 'PAPER ' + e.sym + ' ' + (e.dir > 0 ? 'LONG' : 'SHORT') + ': ' + String(e.result).toUpperCase()
      + ' ' + (e.r > 0 ? '+' : '') + e.r + 'R @ ' + fmtPrice(e.exit);
    Bus.show('📒 ' + msg);
    notifyUser('Rikipo Paper', msg);
  };
  const resolveTick = (sym, px) => setJournal(list => resolvePaperList(list, sym, px, paperNote) || list);

  /* monitor otwartych pozycji paper (co 15 s, także poza aktywnym wykresem) */
  useEffect(() => {
    const h = setInterval(async () => {
      const openP = journal.filter(e => e.paper && e.result === 'open');
      if(!openP.length) return;
      const syms = Array.from(new Set(openP.map(e => e.sym)));
      for(let s=0;s<syms.length;s++){
        const sym = syms[s];
        let px = null;
        try{
          if(capEnabled() && CAP_MAP[sym]){
            const t = await capitalTick(sym);
            if(t) px = t.px;
          }
        }catch(e){}
        if(px == null){
          try{
            const r = await fetchQuotes([sym]);
            if(r && r[sym] && r[sym].price != null) px = r[sym].price;
          }catch(e){}
        }
        if(px != null) resolveTick(sym, px);
      }
    }, 15000);
    return () => clearInterval(h);
  }, [journal]);

  /* ---- GLOBALNY SKANER WATCHLISTY W TLE ----
     skanuje całą listę na wybranym TF co ~45 s, alarmuje o nowych sygnałach
     nawet gdy ekran instrumentu nie jest otwarty. Dedup + cooldown per symbol.
     Pomija symbol aktualnie otwarty na wykresie (tamten ekran ma własny alert). */
  const bgAlertRef = useRef({});
  const bgBusyRef = useRef(false);
  useEffect(() => {
    if(!prefs.bgScan || !prefs.alert) return;
    const tfObj = TFS.find(t => t.id === prefs.tf) || TFS[1];
    const runScan = async () => {
      if(bgBusyRef.current) return;
      bgBusyRef.current = true;
      try{
        const activeSym = (screen === 'chart' && active) ? active.sym : null;
        for(let s=0;s<wl.length;s++){
          const it = wl[s];
          if(!it || it.sym === activeSym) continue;
          let res = null;
          try{ res = await analyzeSymbol(it.sym, tfObj, prefs.source, prefs.minScore); }catch(e){ continue; }
          const sig = res && res.signal;
          if(!sig || sig.dir === 0) continue;
          if(prefs.onlyStrong && !sig.strong) continue;
          if(prefs.waitPullback && sig.entryQuality && sig.entryQuality.chase && !sig.strong) continue;
          const st = bgAlertRef.current[it.sym] || { dir:0, t:0, bar:null };
          const nowMs = Date.now();
          const sameDir = st.dir === sig.dir;
          const sameBar = st.bar === sig.t;
          const tooSoon = (nowMs - st.t) < 5*60*1000;
          if(sameDir && (sameBar || tooSoon)) continue;
          bgAlertRef.current[it.sym] = { dir:sig.dir, t:nowMs, bar:sig.t };
          const dtxt = sig.dir > 0 ? 'LONG' : 'SHORT';
          const strong = !!sig.strong;
          const htfTag = sig.htfDir && sig.htfDir === sig.dir ? ' ✓HTF' : '';
          const eq = sig.entryQuality;
          const eqTag = eq ? (eq.good ? ' ✓przy strefie' : eq.chase ? ' ⚠gonienie' : '') : '';
          const msg = (strong ? '★ ' : '') + it.sym + ' ' + tfObj.label + ': ' + dtxt
            + ' (' + (sig.score > 0 ? '+' : '') + sig.score + htfTag + eqTag + ')'
            + (sig.levels ? ' · SL ' + fmtPrice(sig.levels.sl) + ' · TP1 ' + fmtPrice(sig.levels.tp1) : '');
          notifyUser('Rikipo Trader — ' + (strong ? 'MOCNY ' : '') + dtxt + ' ' + it.sym, msg);
          Bus.show((strong ? '🔥 ' : '⚡ ') + '[skaner] ' + msg);
          await new Promise(r => setTimeout(r, 400)); /* łagodzimy tempo zapytań */
        }
      } finally {
        bgBusyRef.current = false;
      }
    };
    const first = setTimeout(runScan, 4000);
    const h = setInterval(runScan, 45000);
    return () => { clearTimeout(first); clearInterval(h); };
  }, [prefs.bgScan, prefs.alert, prefs.tf, prefs.source, prefs.onlyStrong, prefs.waitPullback, prefs.minScore, wl, screen, active]);

  const openChart = (item) => {
    setActive(item);
    Store.set('rt_last', item);
    setScreen('chart');
  };
  const goChartTab = () => {
    const it = active || wl[0];
    if(!it){ Bus.show('Najpierw dodaj instrument do listy'); return; }
    openChart(it);
  };

  return (
    <div className="app">
      {screen === 'list' && <WatchlistScreen wl={wl} setWl={setWl} openChart={openChart} prefs={prefs} setPrefs={setPrefs} />}
      {screen === 'chart' && active && (
        <ChartScreen item={active} onBack={() => setScreen('list')} prefs={prefs} setPrefs={setPrefs} ai={ai} setAi={setAi} addJournal={addJournal} journal={journal} resolveTick={resolveTick} />
      )}
      {screen === 'journal' && <JournalScreen journal={journal} setJournal={setJournal} />}
      {screen === 'info' && <InfoScreen prefs={prefs} setPrefs={setPrefs} ai={ai} setAi={setAi} cap={cap} setCap={setCap} wl={wl} setWl={setWl} journal={journal} setJournal={setJournal} />}

      <div className="nav">
        <button className={screen === 'list' ? 'sel' : ''} onClick={() => setScreen('list')}>
          <Ic d={IC.rows} size={21} />RYNKI
        </button>
        <button className={screen === 'chart' ? 'sel' : ''} onClick={goChartTab}>
          <Ic d={IC.candle} size={21} />WYKRES
        </button>
        <button className={screen === 'journal' ? 'sel' : ''} onClick={() => setScreen('journal')}>
          <Ic d={IC.book} size={21} />DZIENNIK
        </button>
        <button className={screen === 'info' ? 'sel' : ''} onClick={() => setScreen('info')}>
          <Ic d={IC.info} size={21} extra={<circle cx="12" cy="12" r="9" />} />INFO
        </button>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
