name: Build Rikipo Trader APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform (jeśli brak)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync web -> Android
        run: npx cap sync android

      - name: Ustaw versionCode / versionName
        run: |
          VC=${{ github.run_number }}
          VN="1.0.${{ github.run_number }}"
          echo "versionCode=$VC versionName=$VN"
          sed -i "s/versionCode .*/versionCode $VC/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"$VN\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Odtwórz keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/app/rikipo-release.keystore
          ls -la android/app/rikipo-release.keystore

      - name: Build podpisanego APK (release)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/rikipo-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASS }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASS }}

      - name: Zmień nazwę APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/release/app-release.apk \
             out/rikipo-trader-v1.0.${{ github.run_number }}.apk
          ls -la out

      - name: Upload artefakt (APK)
        uses: actions/upload-artifact@v4
        with:
          name: rikipo-trader-apk
          path: out/*.apk

      - name: Utwórz Release z APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Rikipo Trader v1.0.${{ github.run_number }}
          files: out/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
