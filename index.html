<style>
  :root{
    --bg:#051b21; --panel:#0a2830; --panel2:#0d323c; --panel3:#123c48;
    --border:rgba(159,226,214,.10); --border2:rgba(159,226,214,.18);

  html,body{height:100%;overscroll-behavior:none}
  body{
    background:var(--bg); color:var(--text);

  button{font-family:inherit;color:var(--text);background:none;border:none;cursor:pointer}

    width:28px;height:28px;border-radius:50%;flex-shrink:0;
    background:rgba(255,107,94,.15);color:var(--down);

  .section-label{

  /* ---------- chips ---------- */

  /* ---------- chart screen ---------- */

  /* ---------- bottom nav ---------- */
  .nav{
    display:flex;flex-shrink:0;background:rgba(8,34,41,.94);
    border-top:1px solid var(--border);backdrop-filter:blur(8px);
    padding-bottom:env(safe-area-inset-bottom,0px);

  .nav button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;

  /* ---------- info ---------- */
  .card{

  .card h3{font-size:12px;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim2);margin-bottom:8px}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:4px 0;font-size:13px}
  .kv b{color:var(--dim);font-weight:600}
  .phase{display:flex;gap:10px;padding:6px 0;font-size:13px;align-items:baseline}
  .badge{font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:6px;flex-shrink:0}
  .b-done{background:rgba(47,214,174,.16);color:var(--up)}
  .b-next{background:rgba(79,216,255,.13);color:var(--cyan)}
  .b-plan{background:var(--panel3);color:var(--dim2)}

  .toast{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom,0px) + 76px);z-index:99;
    background:var(--panel3);border:1px solid var(--border2);color:var(--text);
    padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;
    max-width:88%;animation:fadeUp .2s ease;box-shadow:0 6px 24px rgba(0,0,0,.4);
  }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* =====================================================================
   RIKIPO TRADER — Faza 1
   Moduły: [1] Storage  [2] Warstwa danych  [3] Wskaźniki
           [4] Silnik wykresu (canvas)  [5] Ekrany  [6] App
   Architektura przygotowana pod Fazy 2-6 (wskaźniki, formacje,
   sygnały, AI+news, backtest).
   ===================================================================== */

/* ============================ [1] STORAGE ============================ */
const Store = (() => {
  const mem = {};
  let ok = false;
  try { localStorage.setItem('__rt_test','1'); localStorage.removeItem('__rt_test'); ok = true; } catch(e){ ok = false; }
  return {
    persistent: ok,
    get(k, d){
      try{ if(ok){ const v = localStorage.getItem(k); if(v !== null) return JSON.parse(v); } }catch(e){}
      return (k in mem) ? mem[k] : d;
    },
    set(k, v){
      mem[k] = v;
      try{ if(ok) localStorage.setItem(k, JSON.stringify(v)); }catch(e){}
    }
  };
})();

/* ========================= [2] WARSTWA DANYCH ======================== */
const Net = {
  last: '—',                 // ostatni działający kanał
  mode: null,                // zapamiętany kanał (szybki start)
  blockedUntil: 0,           // bezpiecznik: do kiedy sieć uznana za zablokowaną
  native: !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()),
  plugin: !!(window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.CapacitorHttp),
};

const PROXIES = [
  { name:'proxy #1', raw:true,  mk:u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u) },
  { name:'proxy #2', raw:true,  mk:u => 'https://corsproxy.io/?url=' + encodeURIComponent(u) },
  { name:'proxy #3', raw:true,  mk:u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u) },
  { name:'proxy #4', raw:false, mk:u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u) },
];

/* fetch z twardym timeoutem */
function fetchT(url, ms, opts){
  return new Promise((resolve, reject) => {
    const ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    const to = setTimeout(() => {
      if(ctrl) ctrl.abort();
      reject(new Error('timeout'));
    }, ms);
    fetch(url, Object.assign({}, opts || {}, ctrl ? { signal: ctrl.signal } : {}))
      .then(r => { clearTimeout(to); resolve(r); })
      .catch(e => { clearTimeout(to); reject(e); });
  });
}

/* pierwszy udany z listy promisów (wyścig) */
function firstOk(promises){
  return new Promise((resolve, reject) => {
    let pending = promises.length, done = false;
    if(!pending) return reject(new Error('empty'));
    promises.forEach(p => {
      p.then(v => { if(!done){ done = true; resolve(v); } })
       .catch(() => { pending--; if(pending === 0 && !done) reject(new Error('all failed')); });
    });
  });
}

async function viaProxy(p, url, ms){
  const r = await fetchT(p.mk(url), ms);
  if(!r.ok) throw new Error('http ' + r.status);
  if(p.raw){
    const t = await r.text();
    if(!t) throw new Error('pusta odpowiedź');
    Net.last = p.name; Net.mode = p.name;
    return t;
  }
  const w = await r.json();
  if(!(w && w.contents)) throw new Error('pusta odpowiedź');
  Net.last = p.name; Net.mode = p.name;
  return w.contents;
}

/* --- pamięć podręczna + limit współbieżności + deduplikacja --- */
const Cache = new Map();      // url -> { t, data, src }
const Pending = new Map();    // url -> Promise
const FRESH_MS = 10000;       // dane uznawane za świeże
const STALE_MS = 10*60*1000;  // awaryjnie serwuj do 10 min wstecz
let netBusy = 0; const netQueue = [];
function netAcquire(){
  return new Promise(res => { if(netBusy < 2){ netBusy++; res(); } else netQueue.push(res); });
}
function netRelease(){
  netBusy--;
  const n = netQueue.shift();
  if(n){ netBusy++; n(); }
}
async function fetchText(url){
  const hit = Cache.get(url);
  if(hit && Date.now() - hit.t < FRESH_MS){
    Net.last = hit.src + ' · cache';
    return hit.data;
  }
  if(Pending.has(url)) return Pending.get(url);
  const p = (async () => {
    await netAcquire();
    try{
      const data = await fetchTextNet(url);
      Cache.set(url, { t: Date.now(), data, src: Net.last });
      return data;
    }catch(e){
      const st = Cache.get(url);
      if(st && Date.now() - st.t < STALE_MS){
        Net.last = 'pamięć podręczna (' + Math.round((Date.now()-st.t)/1000) + ' s temu)';
        return st.data;
      }
      throw e;
    }finally{
      netRelease();
      Pending.delete(url);
    }
  })();
  Pending.set(url, p);
  return p;
}
async function fetchJson(url){
  const t = await fetchText(url);
  if(typeof t !== 'string') return t;
  try{
    return JSON.parse(t);
  }catch(e){
    Cache.delete(url);
    throw new Error('Niepoprawna odpowiedź z serwera danych (nie-JSON)');
  }
}

async function fetchTextNet(url){
  /* bezpiecznik: po pełnej porażce odpuszczamy sieć na 12 s */
  if(Net.blockedUntil && Date.now() < Net.blockedUntil){
    throw new Error('Chwilowa przerwa po nieudanych próbach — odczekaj kilka sekund lub odśwież ręcznie.');
  }
  // 1) natywny HTTP (Capacitor) — omija CORS w APK
  if(Net.plugin){
    try{
      const res = await window.Capacitor.Plugins.CapacitorHttp.get({ url, headers:{ 'Accept':'application/json, text/plain, */*' } });
      if(res && res.status >= 200 && res.status < 300){
        Net.last = 'natywny (CapacitorHttp)'; Net.mode = 'cap';
        return (typeof res.data === 'string') ? res.data : JSON.stringify(res.data);
      }
    }catch(e){}
  }
  /* zapasowy host Yahoo — query2 przejmuje, gdy query1 limituje */
  const hosts = (url.indexOf('query1.finance.yahoo.com') !== -1)
    ? [url, url.replace('query1.finance.yahoo.com', 'query2.finance.yahoo.com')]
    : [url];
  // 2) zapamiętane proxy z poprzedniego sukcesu — jedna szybka próba
  if(Net.mode && Net.mode.indexOf('proxy') === 0){
    const p = PROXIES.find(x => x.name === Net.mode);
    if(p){ try{ return await viaProxy(p, hosts[0], 5000); }catch(e){} }
  }
  // 3) bezpośredni fetch (3.5 s)
  try{
    const r = await fetchT(hosts[0], 3500, { headers:{ 'Accept':'application/json, text/plain, */*' } });
    if(r.ok){ Net.last = 'bezpośredni fetch'; Net.mode = 'direct'; return await r.text(); }
  }catch(e){}
  // 4) proxy równolegle, hosty na przemian; druga runda po 1.2 s
  for(let round = 0; round < 2; round++){
    try{
      return await firstOk(PROXIES.map((p, i) => viaProxy(p, hosts[(i + round) % hosts.length], 6000)));
    }catch(e){}
    if(round === 0) await new Promise(res => setTimeout(res, 1200));
  }
  Net.blockedUntil = Date.now() + 12000;
  Net.mode = null;
  throw new Error('Nie udało się pobrać notowań. Publiczne proxy CORS bywają przeciążone — spróbuj za chwilę lub przełącz na DEMO. Pełną stabilność daje wersja APK (natywny HTTP).');
}

const TFS = [
  { id:'M1',  interval:'1m',  range:'1d',  label:'M1'  },
  { id:'M5',  interval:'5m',  range:'5d',  label:'M5'  },
  { id:'M15', interval:'15m', range:'1mo', label:'M15' },
  { id:'M30', interval:'30m', range:'1mo', label:'M30' },
  { id:'H1',  interval:'60m', range:'3mo', label:'H1'  },
  { id:'D1',  interval:'1d',  range:'1y',  label:'D1'  },
];

const DEFAULT_WL = [
  { sym:'^GDAXI',   name:'DAX 40 · DE40' },
  { sym:'^DJI',     name:'Dow Jones · US30' },
  { sym:'^GSPC',    name:'S&P 500 · US500' },
  { sym:'^IXIC',    name:'Nasdaq · NAS100' },
  { sym:'GC=F',     name:'Złoto · GOLD' },
  { sym:'EURUSD=X', name:'EUR/USD' },
];

async function yahooChart(symbol, tf){
  const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol)
    + '?interval=' + tf.interval + '&range=' + tf.range + '&includePrePost=false';
  const j = await fetchJson(url);
  const r = j && j.chart && j.chart.result && j.chart.result[0];
  if(!r){
    const msg = j && j.chart && j.chart.error && j.chart.error.description;
    throw new Error(msg || ('Brak danych dla ' + symbol));
  }
  const ts = r.timestamp || [];
  const q  = (r.indicators && r.indicators.quote && r.indicators.quote[0]) || {};
  const O = q.open||[], H = q.high||[], L = q.low||[], C = q.close||[], V = q.volume||[];
  const candles = [];
  for(let i=0;i<ts.length;i++){
    const o=O[i], h=H[i], l=L[i], c=C[i];
    if(o==null || h==null || l==null || c==null) continue;
    candles.push({ t:ts[i], o, h, l, c, v:(V[i]==null?0:V[i]) });
  }
  const meta = r.meta || {};
  const price = (meta.regularMarketPrice != null) ? meta.regularMarketPrice : (candles.length ? candles[candles.length-1].c : null);
  const prev  = (meta.chartPreviousClose != null) ? meta.chartPreviousClose
              : (meta.previousClose != null) ? meta.previousClose
              : (candles.length ? candles[0].o : null);
  return { candles, meta, price, prev, tz: meta.exchangeTimezoneName || '' };
}

/* ------------- Capital.com — realtime LIVE (darmowe API brokera) ------------- */
const CAP_MAP = {
  '^GDAXI':'GERMANY40', '^DJI':'US30', '^GSPC':'US500', '^IXIC':'US100',
  'GC=F':'GOLD', 'EURUSD=X':'EURUSD', 'BTC-USD':'BTCUSD',
};
const CAP_RES = { M1:'MINUTE', M5:'MINUTE_5', M15:'MINUTE_15', M30:'MINUTE_30', H1:'HOUR', D1:'DAY' };
const CapCfg = { on:false, demo:false, key:'', id:'', pass:'' };
const CapSess = { cst:null, xst:null, at:0, acctSet:false };
let capWarned = false;
function capEnabled(){ return !!(CapCfg.on && CapCfg.key && CapCfg.id && CapCfg.pass); }
const CapDbg = { last:null };
async function capRaw(path, method, body, extraHeaders){
  const base = CapCfg.demo ? 'https://demo-api-capital.backend-capital.com' : 'https://api-capital.backend-capital.com';
  const url = base + path;
  const headers = Object.assign({ 'Content-Type':'application/json', 'Accept':'application/json' }, extraHeaders || {});
  const parse = (d) => {
    if(d == null) return null;
    if(typeof d !== 'string') return d;
    try{ return JSON.parse(d); }catch(e){ return d; }
  };
  try{
    if(Net.plugin){
      const fn = (method === 'POST' || method === 'PUT') ? method.toLowerCase() : 'get';
      const opts = { url, headers };
      if(body != null) opts.data = JSON.stringify(body);
      const res = await window.Capacitor.Plugins.CapacitorHttp[fn](opts);
      CapDbg.last = { via:'native.' + fn, url, status:res.status, body:(typeof res.data === 'string' ? res.data : JSON.stringify(res.data || '')).slice(0, 200) };
      return { status: res.status, data: parse(res.data), headers: res.headers || {} };
    }
    const r = await fetchT(url, 15000, { method: method || 'GET', headers, body: body ? JSON.stringify(body) : undefined });
    const txt = await r.text();
    const hdrs = {};
    try{ r.headers.forEach((val, key) => { hdrs[key] = val; }); }catch(e){}
    CapDbg.last = { via:'fetch', url, status:r.status, body:(txt || '').slice(0, 200) };
    return { status: r.status, data: parse(txt), headers: hdrs };
  }catch(err){
    CapDbg.last = { via:(Net.plugin ? 'native' : 'fetch') + '.EXCEPTION', url, status:'—', body:String(err && err.message || err).slice(0, 200) };
    throw err;
  }
}
function capHdr(h, name){
  if(!h) return null;
  return h[name] || h[name.toLowerCase()] || h[name.toUpperCase()] || null;
}

/* Szyfrowane logowanie (RSA) — eliminuje problem znaków specjalnych w haśle.
   Capital udostępnia klucz publiczny; hasło+timestamp szyfrujemy i wysyłamy w base64. */
async function capEncryptedLogin(base){
  const keyRes = await capRaw('/api/v1/session/encryptionKey', 'GET', null, { 'X-CAP-API-KEY': CapCfg.key });
  if(!(keyRes.status >= 200 && keyRes.status < 300) || !keyRes.data || !keyRes.data.encryptionKey){
    throw new Error('encryptionKey HTTP ' + keyRes.status);
  }
  const pubB64 = keyRes.data.encryptionKey;
  const ts = keyRes.data.timeStamp;
  if(!(window.crypto && window.crypto.subtle)) throw new Error('brak WebCrypto');
  const der = Uint8Array.from(atob(pubB64), c => c.charCodeAt(0));
  const pubKey = await window.crypto.subtle.importKey(
    'spki', der.buffer,
    { name:'RSA-OAEP', hash:'SHA-1' },
    false, ['encrypt']
  );
  const plain = new TextEncoder().encode(CapCfg.pass + '|' + ts);
  const enc = await window.crypto.subtle.encrypt({ name:'RSA-OAEP' }, pubKey, plain);
  const encB64 = btoa(String.fromCharCode.apply(null, new Uint8Array(enc)));
  const res = await capRaw('/api/v1/session', 'POST',
    { identifier: CapCfg.id, password: encB64, encryptedPassword: true },
    { 'X-CAP-API-KEY': CapCfg.key });
  return res;
}

async function capSession(){
  if(CapSess.cst && Date.now() - CapSess.at < 8*60*1000) return;
  const base = CapCfg.demo ? 'https://demo-api-capital.backend-capital.com' : 'https://api-capital.backend-capital.com';
  const bodyObj = { identifier: CapCfg.id, password: CapCfg.pass, encryptedPassword: false };
  let res = await capRaw('/api/v1/session', 'POST', bodyObj, { 'X-CAP-API-KEY': CapCfg.key });

  /* jeśli plugin zniekształcił hasło ze znakami specjalnymi (invalid.details),
     spróbuj wariantu z surowym obiektem (drugi tryb wysyłki) */
  if(res.status === 401 && Net.plugin){
    const ec = (res.data && res.data.errorCode) ? res.data.errorCode : '';
    if(String(ec).indexOf('invalid.details') !== -1){
      try{
        const raw = await window.Capacitor.Plugins.CapacitorHttp.post({
          url: base + '/api/v1/session',
          headers: { 'Content-Type':'application/json', 'Accept':'application/json', 'X-CAP-API-KEY': CapCfg.key },
          data: bodyObj,
        });
        res = {
          status: raw.status,
          data: (typeof raw.data === 'string' && raw.data) ? (function(){ try{ return JSON.parse(raw.data); }catch(e){ return raw.data; } })() : raw.data,
          headers: raw.headers || {},
        };
      }catch(e){}
    }
  }

  /* ostateczny ratunek: logowanie szyfrowane RSA — omija każdy problem
     z kodowaniem znaków specjalnych w haśle */
  if(res.status === 401){
    const ec = (res.data && res.data.errorCode) ? res.data.errorCode : '';
    if(String(ec).indexOf('invalid.details') !== -1){
      try{
        const encRes = await capEncryptedLogin(base);
        if(encRes.status >= 200 && encRes.status < 300) res = encRes;
      }catch(e){}
    }
  }

  if(!(res.status >= 200 && res.status < 300)){
    let detail = '';
    try{
      if(res.data){
        detail = (typeof res.data === 'string') ? res.data : JSON.stringify(res.data);
        detail = detail.slice(0, 160);
      }
    }catch(e){}
    const ec = (res.data && res.data.errorCode) ? res.data.errorCode : detail;
    throw new Error('POST ' + base + '/api/v1/session → HTTP ' + res.status + (ec ? ' · ' + ec : '') + ' · środowisko: ' + (CapCfg.demo ? 'DEMO' : 'REALNE') + ' · transport: ' + (Net.plugin ? 'natywny' : 'fetch'));
  }
  const cst = capHdr(res.headers, 'CST');
  const xst = capHdr(res.headers, 'X-SECURITY-TOKEN');
  if(!cst || !xst){
    const hk = res.headers ? Object.keys(res.headers).join(', ') : '(brak)';
    throw new Error('Sesja bez tokenów (CST/X-SECURITY-TOKEN). Otrzymane nagłówki: ' + hk.slice(0, 160) + '. W przeglądarce CORS ukrywa nagłówki — w APK powinny być.');
  }
  CapSess.cst = cst; CapSess.xst = xst; CapSess.at = Date.now();

  /* Capital wymaga jawnego wskazania rachunku. Pobierz listę i ustaw aktywny. */
  if(!CapSess.acctSet){
    let accRes;
    try{
      accRes = await capRaw('/api/v1/accounts', 'GET', null,
        { 'CST': CapSess.cst, 'X-SECURITY-TOKEN': CapSess.xst });
    }catch(e){
      throw new Error('GET /accounts nie powiodło się: ' + (e.message || e));
    }
    if(!(accRes.status >= 200 && accRes.status < 300)){
      let d = ''; try{ d = (typeof accRes.data === 'string') ? accRes.data : JSON.stringify(accRes.data); }catch(e){}
      throw new Error('GET /accounts → HTTP ' + accRes.status + ' · ' + String(d).slice(0, 120));
    }
    const accs = (accRes.data && accRes.data.accounts) || [];
    if(!accs.length){
      throw new Error('Brak rachunków na koncie DEMO. Zaloguj się na capital.com, przełącz na konto Demo i utwórz/zasil rachunek demo.');
    }
    let pref = accs.find(a => a.preferred) || accs[0];
    const accId = pref.accountId;
    if(!accId){
      throw new Error('Rachunek bez accountId (' + JSON.stringify(pref).slice(0, 100) + ')');
    }
    try{
      const put = await capRaw('/api/v1/session', 'PUT',
        { accountId: accId },
        { 'CST': CapSess.cst, 'X-SECURITY-TOKEN': CapSess.xst });
      /* PUT może zwrócić świeże tokeny — zaktualizuj jeśli są */
      const nc = capHdr(put.headers, 'CST'), nx = capHdr(put.headers, 'X-SECURITY-TOKEN');
      if(nc) CapSess.cst = nc;
      if(nx) CapSess.xst = nx;
    }catch(e){
      throw new Error('PUT /session (wybór rachunku) nie powiodło się: ' + (e.message || e));
    }
    CapSess.acctSet = true;
  }
}

function capMid(q){

/* Rozwiązywanie epica: nazwy w API bywają różne (GERMANY40 / DE40 / GDAXI…),
   więc wyszukujemy instrument dynamicznie i cache'ujemy wynik. */
const CapEpicCache = {};
const CAP_SEARCH = {
  '^GDAXI':['GERMANY40','DE40','Germany 40'], '^DJI':['US30','Wall Street','Dow'],
  '^GSPC':['US500','US 500'], '^IXIC':['US100','US Tech 100'],
  'GC=F':['GOLD','Gold'], 'EURUSD=X':['EURUSD','EUR/USD'], 'BTC-USD':['BTCUSD','Bitcoin'],
};
async function capResolveEpic(symbol){
  const preferred = CAP_MAP[symbol];
  if(CapEpicCache[symbol]) return CapEpicCache[symbol];
  /* 1) spróbuj nazwy preferowanej wprost */
  if(preferred){
    try{
      const j = await capGet('/api/v1/markets/' + preferred);
      if(j && j.snapshot){ CapEpicCache[symbol] = preferred; return preferred; }
    }catch(e){}
  }
  /* 2) wyszukaj po frazach */
  const terms = CAP_SEARCH[symbol] || [symbol];
  for(let t=0;t<terms.length;t++){
    try{
      const j = await capGet('/api/v1/markets?searchTerm=' + encodeURIComponent(terms[t]));
      const arr = (j && j.markets) || [];
      /* preferuj instrument, który jest indeksem/otwarty i ma epic zbliżony */
      let pick = arr.find(m => m.epic === preferred)
              || arr.find(m => m.instrumentType && /INDEX|INDICES|COMMODIT|CURRENC|CRYPTO/i.test(m.instrumentType))
              || arr[0];
      if(pick && pick.epic){ CapEpicCache[symbol] = pick.epic; return pick.epic; }
    }catch(e){}
  }
  throw new Error('Nie znaleziono instrumentu „' + (preferred || symbol) + '" na Twoim koncie Capital');
}
async function capitalChart(symbol, tf){
  const epic = await capResolveEpic(symbol);
  const maxN = tf.id === 'D1' ? 300 : (tf.id === 'H1' ? 400 : 420);
  const j = await capGet('/api/v1/prices/' + epic + '?resolution=' + (CAP_RES[tf.id] || 'MINUTE_5') + '&max=' + maxN);
  const arr = (j && j.prices) || [];
  const candles = [];
  for(let q=0;q<arr.length;q++){
    const p = arr[q];
    const o = capMid(p.openPrice), h = capMid(p.highPrice), l = capMid(p.lowPrice), c = capMid(p.closePrice);
    if(o == null || h == null || l == null || c == null) continue;
    const ts = p.snapshotTimeUTC ? Date.parse(p.snapshotTimeUTC + 'Z') : Date.parse(p.snapshotTime);
    if(!isFinite(ts)) continue;
    candles.push({ t: Math.floor(ts/1000), o, h, l, c, v: p.lastTradedVolume || 0 });
  }
  if(candles.length < 10) throw new Error('za mało świec z Capital.com');
  Net.last = 'Capital.com LIVE'; Net.mode = 'capital';
  return {
    candles, meta:{}, tz:'',
    price: candles[candles.length-1].c,
    prev: candles[0].o,
    live: true,
  };
}
async function capitalTick(symbol){
  const epic = await capResolveEpic(symbol);
  const j = await capGet('/api/v1/markets/' + epic);
  const sn = j && j.snapshot;
  if(!sn || sn.bid == null) return null;
  const px = (sn.bid + (sn.offer != null ? sn.offer : sn.bid)) / 2;
  const net = (sn.netChange != null && isFinite(sn.netChange)) ? sn.netChange : null;
  return { px, net };
}

/* --- Capital.com streaming (WebSocket) — płynne ticki jak w xStation --- */
const CapWS = { ws:null, epic:null, onQ:null, timer:null, alive:false, retries:0 };
function capWsStop(){
  CapWS.alive = false; CapWS.epic = null; CapWS.onQ = null;
  if(CapWS.timer){ clearInterval(CapWS.timer); CapWS.timer = null; }
  if(CapWS.ws){ try{ CapWS.ws.close(); }catch(e){} CapWS.ws = null; }
}
function capWsStart(epic, onQuote, onState){
  capWsStop();
  CapWS.alive = true; CapWS.epic = epic; CapWS.onQ = onQuote;
  const loop = async () => {
    if(!CapWS.alive || CapWS.epic !== epic) return;
    try{
      await capSession();
      const ws = new WebSocket('wss://api-streaming-capital.backend-capital.com/connect');
      CapWS.ws = ws;
      ws.onopen = () => {
        CapWS.retries = 0;
        try{
          ws.send(JSON.stringify({
            destination:'marketData.subscribe', correlationId:'1',
            cst:CapSess.cst, securityToken:CapSess.xst,
            payload:{ epics:[epic] },
          }));
        }catch(e){}
        if(CapWS.timer) clearInterval(CapWS.timer);
        CapWS.timer = setInterval(() => {
          try{
            ws.send(JSON.stringify({ destination:'ping', correlationId:'p', cst:CapSess.cst, securityToken:CapSess.xst }));
          }catch(e){}
        }, 30000);
        if(onState) onState(true);
      };
      ws.onmessage = ev => {
        try{
          const m = JSON.parse(ev.data);
          if(m.destination === 'quote' && m.payload && m.payload.epic === epic){
            const b = m.payload.bid;
            const o = (m.payload.ofr != null) ? m.payload.ofr : m.payload.offer;
            if(b != null && CapWS.onQ) CapWS.onQ((b + (o != null ? o : b))/2);
          }
        }catch(e){}
      };
      ws.onclose = () => {
        if(CapWS.timer){ clearInterval(CapWS.timer); CapWS.timer = null; }
        if(onState) onState(false);
        if(CapWS.alive && CapWS.epic === epic){
          CapSess.at = 0; CapSess.cst = null; CapSess.acctSet = false;
          CapWS.retries++;
          setTimeout(loop, Math.min(15000, 1500 * CapWS.retries));
        }
      };
      ws.onerror = () => { try{ ws.close(); }catch(e){} };
    }catch(e){
      if(onState) onState(false);
      if(CapWS.alive && CapWS.epic === epic){
        CapWS.retries++;
        setTimeout(loop, Math.min(20000, 2500 * CapWS.retries));
      }
    }
  };
  loop();
}

/* --- Paper trading: wirtualne pozycje rozliczane po żywej cenie --- */
function paperFloating(e, px){
  if(px == null || !e || !e.risk) return null;
  return +(((px - e.entry) / e.risk) * e.dir).toFixed(2);
}
function resolvePaperList(list, sym, px, notify){
  let changed = false;
  const out = list.map(e => {
    if(!(e.paper && e.result === 'open' && e.sym === sym && e.risk)) return e;
    let res = null, r = 0, lvl = null;
    if(e.dir === 1){
      if(px <= e.sl){ res = 'sl'; r = -1; lvl = e.sl; }
      else if(e.tp2 != null && px >= e.tp2){ res = 'tp2'; r = 2.5; lvl = e.tp2; }
      else if(px >= e.tp1){ res = 'tp1'; r = (e.rr1 || 1.5); lvl = e.tp1; }
    } else {
      if(px >= e.sl){ res = 'sl'; r = -1; lvl = e.sl; }
      else if(e.tp2 != null && px <= e.tp2){ res = 'tp2'; r = 2.5; lvl = e.tp2; }
      else if(px <= e.tp1){ res = 'tp1'; r = (e.rr1 || 1.5); lvl = e.tp1; }
    }
    if(!res) return e;
    changed = true;
    const done = { ...e, result:res, r, exit:lvl, exitTs:Date.now() };
    if(notify) notify(done);
    return done;
  });
  return changed ? out : null;
}

/* --------------------- TRYB DEMO (offline fallback) ------------------ */
const DEMO_BASE = {
  '^GDAXI':24180, '^DJI':44650, '^GSPC':6120, '^IXIC':20050,
  'GC=F':2745, 'EURUSD=X':1.083, 'BTC-USD':98400,
};
const TF_SEC = { M1:60, M5:300, M15:900, M30:1800, H1:3600, D1:86400 };
/* mapowanie interwału na wyższy interwał do filtra trendu */
const HTF_MAP = { M1:{id:'M15',label:'M15'}, M5:{id:'M15',label:'M15'}, M15:{id:'H1',label:'H1'}, M30:{id:'H1',label:'H1'}, H1:{id:'D1',label:'D1'}, D1:null };
/* agregacja świec z niższego TF do wyższego (buckety po czasie) i kierunek EMA */
function htfTrend(candles, tfId){
  const map = HTF_MAP[tfId];
  if(!map || !candles || candles.length < 60) return { dir:0, label: map ? map.label : '' };
  const step = TF_SEC[map.id];
  const buckets = new Map();
  for(let q=0;q<candles.length;q++){
    const c = candles[q];
    const key = Math.floor(c.t / step) * step;
    let b = buckets.get(key);
    if(!b){ b = { t:key, o:c.o, h:c.h, l:c.l, c:c.c }; buckets.set(key, b); }
    else { if(c.h > b.h) b.h = c.h; if(c.l < b.l) b.l = c.l; b.c = c.c; }
  }
  const agg = Array.from(buckets.values()).sort((a,b) => a.t - b.t);
  if(agg.length < 25) return { dir:0, label: map.label };
  const closes = agg.map(x => x.c);
  const e20 = emaOver(closes, 20), e50 = emaOver(closes, 50);
  const i = closes.length - 1;
  const p = closes[i], a20 = e20[i], a50 = e50[i], a20p = e20[i-3];
  let dir = 0;
  if(a20 != null && a50 != null){
    if(p > a20 && a20 > a50 && (a20p == null || a20 >= a20p)) dir = 1;
    else if(p < a20 && a20 < a50 && (a20p == null || a20 <= a20p)) dir = -1;
  }
  return { dir, label: map.label };
}
function seedFrom(str){
  let h = 2166136261;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function rng32(seed){
  let a = seed;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const DemoCache = new Map();
function demoChart(symbol, tf){
  const key = symbol + '|' + (tf.id || tf.interval);
  const step = TF_SEC[tf.id] || 300;
  const now = Math.floor(Date.now()/1000);
  let st = DemoCache.get(key);
  if(!st){
    const base = DEMO_BASE[symbol] || (50 + (seedFrom(symbol) % 4000) / 10);
    const rnd = rng32(seedFrom(key));
    const n = tf.id === 'D1' ? 260 : 420;
    const sigma = 0.00055 * Math.sqrt(step/60);
    let p = base * (0.985 + rnd()*0.03);
    const candles = [];
    let t = now - n*step;
    for(let i=0;i<n;i++){
      const drift = Math.sin(i/34)*sigma*0.7 + Math.sin(i/9)*sigma*0.35;
      const o = p;

function emaSeries(closes, n){
  const out = new Array(closes.length).fill(null);
  if(closes.length < n) return out;
  let sum = 0;
  for(let i=0;i<n;i++) sum += closes[i];
  let prev = sum / n;
  out[n-1] = prev;
  const k = 2/(n+1);
  for(let i=n;i<closes.length;i++){
    prev = closes[i]*k + prev*(1-k);
    out[i] = prev;
  }
  return out;
}

/* ---------------- Faza 2: biblioteka wskaźników ---------------- */
function smaOver(arr, n){
  const out = new Array(arr.length).fill(null);
  let sum = 0; const q = [];
  for(let i=0;i<arr.length;i++){
    const v = arr[i];
    if(v == null) continue;
    q.push(v); sum += v;
    if(q.length > n) sum -= q.shift();
    if(q.length === n) out[i] = sum / n;
  }
  return out;
}
function emaOver(arr, n){
  const out = new Array(arr.length).fill(null);
  const k = 2/(n+1);
  let prev = null; const seed = [];
  for(let i=0;i<arr.length;i++){
    const v = arr[i];
    if(v == null) continue;
    if(prev == null){
      seed.push(v);
      if(seed.length === n){
        let s = 0;
        for(let j=0;j<n;j++) s += seed[j];
        prev = s / n;
        out[i] = prev;
      }
      continue;
    }
    prev = v*k + prev*(1-k);
    out[i] = prev;
  }
  return out;
}
function rsiSeries(closes, n){
  const out = new Array(closes.length).fill(null);
  if(closes.length <= n) return out;
  let ag = 0, al = 0;
  for(let i=1;i<=n;i++){
    const d = closes[i] - closes[i-1];
    if(d >= 0) ag += d; else al -= d;
  }
  ag /= n; al /= n;
  out[n] = al === 0 ? 100 : 100 - 100/(1 + ag/al);
  for(let i=n+1;i<closes.length;i++){
    const d = closes[i] - closes[i-1];
    const g = d > 0 ? d : 0, l = d < 0 ? -d : 0;
    ag = (ag*(n-1) + g)/n;
    al = (al*(n-1) + l)/n;
    out[i] = al === 0 ? 100 : 100 - 100/(1 + ag/al);
  }
  return out;
}
function trAt(candles, i){
  const c = candles[i], p = candles[i-1];

}
function atrSeries(candles, n){
  const out = new Array(candles.length).fill(null);
  if(candles.length <= n) return out;
  let a = 0;
  for(let i=1;i<=n;i++) a += trAt(candles, i);
  a /= n; out[n] = a;
  for(let i=n+1;i<candles.length;i++){

}
function macdSeries(closes, f, s, sg){

  const signal = emaOver(macd, sg);

}
function bollSeries(closes, n, k){
  const mid = smaOver(closes, n);
  const up = new Array(closes.length).fill(null);
  const dn = new Array(closes.length).fill(null);
  for(let i=n-1;i<closes.length;i++){
    if(mid[i] == null) continue;
    let s2 = 0;
    for(let j=i-n+1;j<=i;j++){ const d = closes[j] - mid[i]; s2 += d*d; }
    const sd = Math.sqrt(s2/n);

    dn[i] = mid[i] - k*sd;

}
function stochSeries(candles, n, ks, ds){
  const raw = new Array(candles.length).fill(null);

function adxSeries(candles, n){
  const len = candles.length;
  const adx = new Array(len).fill(null), pdi = new Array(len).fill(null), mdi = new Array(len).fill(null);
  if(len <= n*2 + 1) return { adx, pdi, mdi };
  let trS = 0, pS = 0, mS = 0;
  for(let i=1;i<=n;i++){
    const up = candles[i].h - candles[i-1].h;
    const dn = candles[i-1].l - candles[i].l;
    pS += (up > dn && up > 0) ? up : 0;
    mS += (dn > up && dn > 0) ? dn : 0;
    trS += trAt(candles, i);
  }
  const dx = new Array(len).fill(null);
  const put = i => {
    const p = trS > 0 ? 100*pS/trS : 0;
    const m = trS > 0 ? 100*mS/trS : 0;
    pdi[i] = p; mdi[i] = m;
    const s = p + m;
    dx[i] = s > 0 ? 100*Math.abs(p - m)/s : 0;
  };
  put(n);
  for(let i=n+1;i<len;i++){
    const up = candles[i].h - candles[i-1].h;
    const dn = candles[i-1].l - candles[i].l;
    trS = trS - trS/n + trAt(candles, i);
    pS = pS - pS/n + ((up > dn && up > 0) ? up : 0);
    mS = mS - mS/n + ((dn > up && dn > 0) ? dn : 0);
    put(i);
  }
  let a = 0, c = 0, st = -1;
  for(let i=n;i<len;i++){
    if(dx[i] == null) continue;
    a += dx[i]; c++;
    if(c === n){ st = i; adx[i] = a/n; break; }
  }
  if(st !== -1){
    let prev = adx[st];
    for(let i=st+1;i<len;i++){
      prev = (prev*(n-1) + dx[i])/n;
      adx[i] = prev;
    }

}
function obvSeries(candles){
  const out = new Array(candles.length).fill(null);

  let o = 0; out[0] = 0;
  for(let i=1;i<candles.length;i++){
    if(candles[i].c > candles[i-1].c) o += candles[i].v;
    else if(candles[i].c < candles[i-1].c) o -= candles[i].v;

function dayKeyUTC(t){
  const d = new Date(t*1000);
  return d.getUTCFullYear()*10000 + (d.getUTCMonth()+1)*100 + d.getUTCDate();
}
function vwapSeries(candles){
  const out = new Array(candles.length).fill(null);

/* automatyczne strefy S/R: pivoty fraktalne + klastrowanie wg ATR */
function findSRZones(candles, atrLast){
  const len = candles.length;
  if(len < 30) return [];
  const w = 4;
  const piv = [];
  for(let i=w;i<len-w;i++){
    let ph = true, pl = true;
    for(let j=1;j<=w;j++){
      if(!(candles[i].h > candles[i-j].h && candles[i].h > candles[i+j].h)) ph = false;
      if(!(candles[i].l < candles[i-j].l && candles[i].l < candles[i+j].l)) pl = false;
      if(!ph && !pl) break;
    }
    if(ph) piv.push({ p: candles[i].h, i });
    if(pl) piv.push({ p: candles[i].l, i });
  }
  if(!piv.length) return [];
  const last = candles[len-1].c;
  const tol = Math.max((atrLast || last*0.004) * 0.35, last*0.0006);
  piv.sort((a, b) => a.p - b.p);
  const zones = [];
  let cur = [piv[0]];
  const flush = () => {
    if(!cur.length) return;
    let lo = Infinity, hi = -Infinity, rec = 0;
    for(let j=0;j<cur.length;j++){
      if(cur[j].p < lo) lo = cur[j].p;
      if(cur[j].p > hi) hi = cur[j].p;
      if(cur[j].i > rec) rec = cur[j].i;
    }
    if(hi - lo < tol*0.5){ const mid = (hi+lo)/2; lo = mid - tol*0.25; hi = mid + tol*0.25; }
    zones.push({ lo, hi, touches: cur.length, score: cur.length + rec/len });
  };
  for(let i=1;i<piv.length;i++){
    if(piv[i].p - cur[cur.length-1].p <= tol) cur.push(piv[i]);
    else { flush(); cur = [piv[i]]; }
  }
  flush();
  zones.sort((a, b) => b.score - a.score);
  return zones.slice(0, 6);
}

function candleStats(c){
  const body = Math.abs(c.c - c.o);
  const range = Math.max(c.h - c.l, 1e-9);
  return {
    body, range,
    bull: c.c >= c.o,
    up: c.h - Math.max(c.c, c.o),
    dn: Math.min(c.c, c.o) - c.l,
    bp: body / range,
  };
}

          62 + (1 - Math.abs(a.p - c.p)/tol)*15 + Math.min(10, (Math.min(a.p, c.p) - b.p)/atrLast*3),

          c.i, a.i, [

    const wid1 = (lh.m*i1 + lh.b) - (ll.m*i1 + ll.b);
    const lines = [
      { i0, p0: lh.m*i0 + lh.b, i1, p1: lh.m*i1 + lh.b },
      { i0, p0: ll.m*i0 + ll.b, i1, p1: ll.m*i1 + ll.b },
    ];
    const conv = wid1 < wid0*0.8;
    const F = 0.05;

    if(wid0 > atrLast*0.8 && wid1 > -atrLast*0.2 && span >= 10 && span <= 240){

        else if(Math.abs(sL) < F && sH < -F) add('Trójkąt malejący', -1, base + 6, i0, i1, lines);

function computeSignal(candles, ind, emaData, patterns, hasVol, atIdx, srOverride){
  const n = candles.length;
  const i = (atIdx != null) ? atIdx : n - 1;
  if(!ind || i < 30) return null;
  const c = candles[i];
  const price = c.c;
  const v = a => (a && a[i] != null) ? a[i] : null;
  let atr = v(ind.atr);
  if(atr == null){
    for(let q=ind.atr.length-1;q>=0;q--){ if(ind.atr[q] != null){ atr = ind.atr[q]; break; } }
  }
  if(!atr) return null;

  const reasons = [];
  const warns = [];
  let score = 0;
  const add = (pts, txt) => {
    pts = Math.round(pts);
    if(pts === 0) return;
    score += pts;
    reasons.push({ pts, txt });
  };

  const e20 = emaData[20], e50 = emaData[50], e200 = emaData[200];
  const v20 = v(e20), v50 = v(e50), v200 = v(e200);

  /* 1) struktura EMA */
  if(v20 != null && v50 != null){
    if(price > v20 && v20 > v50) add(14, 'Cena > EMA20 > EMA50 — układ wzrostowy');
    else if(price < v20 && v20 < v50) add(-14, 'Cena < EMA20 < EMA50 — układ spadkowy');
  }
  if(v200 != null){
    if(price > v200) add(6, 'Cena nad EMA200 — przewaga popytu długoterminowo');
    else add(-6, 'Cena pod EMA200 — przewaga podaży długoterminowo');
  }
  if(e20 && e20[i] != null && e20[i-4] != null){
    const sl = (e20[i] - e20[i-4]) / atr;
    if(sl > 0.3) add(8, 'EMA20 wyraźnie rośnie');
    else if(sl < -0.3) add(-8, 'EMA20 wyraźnie spada');
  }

  /* 2) RSI */
  const rsi = v(ind.rsi);
  if(rsi != null){
    if(rsi >= 55 && rsi <= 70) add(8, 'RSI ' + rsi.toFixed(0) + ' — momentum pro-wzrostowe');
    else if(rsi <= 45 && rsi >= 30) add(-8, 'RSI ' + rsi.toFixed(0) + ' — momentum pro-spadkowe');
    else if(rsi > 70) add(-4, 'RSI ' + rsi.toFixed(0) + ' — wykupienie, ryzyko korekty');
    else if(rsi < 30) add(4, 'RSI ' + rsi.toFixed(0) + ' — wyprzedanie, możliwe odbicie');

    else add(-7, 'MACD pod linią sygnału');

    }
    out.levels = { entry, sl, tp1, tp2, slDist, rr1:1.5, rr2:2.5 };

    /* --- JAKOŚĆ WEJŚCIA: jak blisko cena jest kotwicy (EMA20 / S/R / VWAP) ---
       blisko kotwicy = świeże wejście przy strefie (dobre); daleko = gonienie ruchu.
       dystans liczony w ATR do NAJBLIŻSZEJ sensownej kotwicy dla danego kierunku. */
    const anchors = [];
    if(v20 != null) anchors.push({ name:'EMA20', px:v20 });
    if(vw != null)  anchors.push({ name:'VWAP',  px:vw });
    if(dir === 1 && nearSup) anchors.push({ name:'wsparcie', px:nearSup.hi });
    if(dir === -1 && nearRes) anchors.push({ name:'opór', px:nearRes.lo });
    let bestDist = null, bestName = null;
    for(let q=0;q<anchors.length;q++){
      const d = Math.abs(price - anchors[q].px) / atr;
      if(bestDist == null || d < bestDist){ bestDist = d; bestName = anchors[q].name; }
    }
    if(bestDist != null){
      /* progi (umiarkowane): ≤0.6 ATR = przy strefie, ≤1.3 = ok, >1.3 = gonienie */
      let grade, gpts;
      if(bestDist <= 0.6){ grade = 'przy strefie'; gpts = 6; }
      else if(bestDist <= 1.3){ grade = 'akceptowalne'; gpts = 0; }
      else { grade = 'gonienie ruchu'; gpts = -8; }
      out.entryQuality = {
        dist: +bestDist.toFixed(2), anchor: bestName, grade,
        good: bestDist <= 0.6, chase: bestDist > 1.3,
      };
      /* modyfikacja score: dobre wejście lekko premiowane, gonione karane */
      const adj = dir * gpts;
      if(adj !== 0){
        score = Math.max(-100, Math.min(100, score + adj));
        out.score = score;
        out.strong = Math.abs(score) >= STRONG;
      }
      if(bestDist > 1.3){
        warns.push('Cena ' + bestDist.toFixed(1) + '×ATR od ' + bestName + ' — wejście „w biegu", rozważ poczekać na cofnięcie');
      } else if(bestDist <= 0.6){
        reasons.push({ pts: dir*6, txt:'Świeże wejście tuż przy ' + bestName + ' (dobry timing, ciasny SL)' });
      }
    }
  }

  /* okna makro / otwarcia sesji (czas lokalny) — Twoja zasada */
  const dt = new Date();
  const hm = dt.getHours()*60 + dt.getMinutes();
  const wins = [
    [9*60,        9*60+15,  'otwarcie DAX 09:00'],
    [14*60+22,    14*60+42, 'publikacje USA 14:30'],
    [15*60+25,    15*60+45, 'otwarcie Wall Street 15:30'],
    [15*60+52,    16*60+12, 'dane USA 16:00'],
    [19*60+52,    20*60+15, 'FOMC / minutes 20:00'],
  ];
  for(let q=0;q<wins.length;q++){
    if(hm >= wins[q][0] && hm <= wins[q][1]){
      if(atIdx == null){
        warns.push('Okno makro: ' + wins[q][2] + ' — wejście zablokowane zgodnie z Twoimi zasadami (nie graj przez makro)');
        if(out.dir !== 0){ out.dir = 0; out.macroBlock = true; delete out.levels; }
      }
      break;
    }
  }
  return out;
}

   powiela dokładnie budowę wskaźników z ChartScreen, żeby sygnał był identyczny */
function indicatorsFor(candles, tfId){
  if(!candles || candles.length < 5) return null;
  const closes = candles.map(c => c.c);
  const hasVol = candles.some(c => c.v > 0);
  const atr = atrSeries(candles, 14);
  let atrLast = null;
  for(let i=atr.length-1;i>=0;i--){ if(atr[i] != null){ atrLast = atr[i]; break; } }
  const ind = {
    rsi: rsiSeries(closes, 14),
    macd: macdSeries(closes, 12, 26, 9),
    boll: bollSeries(closes, 20, 2),
    stoch: stochSeries(candles, 14, 3, 3),
    adx: adxSeries(candles, 14),
    atr,
    obv: hasVol ? obvSeries(candles) : null,
    vwap: (hasVol && tfId !== 'D1') ? vwapSeries(candles) : null,
    sr: findSRZones(candles, atrLast),
  };
  const emaData = {};
  for(let i=0;i<EMA_DEFS.length;i++){ emaData[EMA_DEFS[i].n] = emaSeries(closes, EMA_DEFS[i].n); }
  return { ind, emaData, hasVol };
}
async function analyzeSymbol(symbol, tf, source, minScore){
  const data = await getChart(symbol, tf, source);
  if(!data || !data.candles || data.candles.length < 30) return { data, signal:null };
  const pack = indicatorsFor(data.candles, tf.id);
  if(!pack) return { data, signal:null };
  const patRaw = detectPatterns(data.candles, pack.ind.atr, pack.emaData[20], pack.hasVol);
  const patMap = {};
  patRaw.list.forEach(p => { (patMap[p.i] = patMap[p.i] || []).push(p); });
  const patterns = { list:patRaw.list, markers:patRaw.markers, geoDraw:patRaw.geoDraw, patMap };
  const ht = htfTrend(data.candles, tf.id);
  const srWithHtf = (pack.ind.sr || []).slice();
  srWithHtf.__htf = ht;
  srWithHtf.__minScore = (minScore != null ? minScore : 30);
  const signal = computeSignal(data.candles, pack.ind, pack.emaData, patterns, pack.hasVol, null, srWithHtf);
  return { data, signal, demo: !!data.demo };
}

/* ---------------- Faza 6: backtest / alerty ---------------- */
function backtestEngine(candles, ind, emaData, hasVol){
  const n = candles.length;
  const res = { trades:[], equity:[0], stats:null };
  if(n < 90 || !ind) return res;
  const patsWrap = { list: detectCandlePatterns(candles, emaData[20], ind.atr, hasVol) };
  const warmup = 60, maxBars = 60;
  let open = null, cooldownUntil = -1, sum = 0;
  const close = t => { res.trades.push(t); sum += t.r; res.equity.push(+sum.toFixed(2)); };
  for(let i = warmup; i < n - 1; i++){
    if(open){
      const c = candles[i], dir = open.dir;
      const hitSL  = dir === 1 ? c.l <= open.sl  : c.h >= open.sl;
      const hitTP  = dir === 1 ? c.h >= open.tp1 : c.l <= open.tp1;
      const hitTP2 = dir === 1 ? c.h >= open.tp2 : c.l <= open.tp2;
      if(hitSL){
        close({ i0:open.i0, i1:i, dir, r:-1, out:'SL', tp2:false });
        open = null; cooldownUntil = i + 5;
      } else if(hitTP){
        close({ i0:open.i0, i1:i, dir, r:1.5, out:'TP1', tp2:hitTP2 });
        open = null; cooldownUntil = i + 5;
      } else if(i - open.i0 >= maxBars){
        const r = +(((c.c - open.entry) / open.risk) * dir).toFixed(2);
        close({ i0:open.i0, i1:i, dir, r, out:'TIMEOUT', tp2:false });
        open = null; cooldownUntil = i + 5;
      }
      continue;
    }
    if(i < cooldownUntil) continue;
    /* strefy S/R liczone WYŁĄCZNIE z danych do świecy i — zero lookahead */
    const zonesI = findSRZones(candles.slice(0, i + 1), (ind.atr[i] != null ? ind.atr[i] : null));
    const sig = computeSignal(candles, ind, emaData, patsWrap, hasVol, i, zonesI);
    if(sig && sig.dir !== 0 && sig.levels){
      open = {
        i0:i, dir:sig.dir,
        entry:sig.levels.entry, sl:sig.levels.sl,
        tp1:sig.levels.tp1, tp2:sig.levels.tp2,
        risk:sig.levels.slDist,
      };
    }
  }
  const T = res.trades;
  const wins = T.filter(t => t.out === 'TP1').length;
  const losses = T.filter(t => t.out === 'SL').length;
  const timeouts = T.filter(t => t.out === 'TIMEOUT').length;
  const grossW = T.reduce((a, t) => a + (t.r > 0 ? t.r : 0), 0);
  const grossL = T.reduce((a, t) => a + (t.r < 0 ? -t.r : 0), 0);
  let peak = 0, dd = 0;
  for(let q=0;q<res.equity.length;q++){
    const v2 = res.equity[q];
    if(v2 > peak) peak = v2;
    if(peak - v2 > dd) dd = peak - v2;
  }
  let mc = 0, cur = 0;
  T.forEach(t => { if(t.r < 0){ cur++; if(cur > mc) mc = cur; } else { cur = 0; } });
  const tp1n = T.filter(t => t.out === 'TP1');
  res.stats = {
    n: T.length, wins, losses, timeouts,
    winRate: (wins + losses) ? wins/(wins + losses)*100 : 0,
    timeoutPct: T.length ? Math.round(timeouts/T.length*100) : 0,
    sumR: +sum.toFixed(2),
    avgR: T.length ? +(sum/T.length).toFixed(2) : 0,
    pf: grossL > 0 ? +(grossW/grossL).toFixed(2) : (grossW > 0 ? 99 : 0),
    maxDD: +dd.toFixed(2),
    maxConsecLoss: mc,
    tp2Pct: tp1n.length ? Math.round(tp1n.filter(t => t.tp2).length / tp1n.length * 100) : 0,
    longs: T.filter(t => t.dir === 1).length,
    shorts: T.filter(t => t.dir === -1).length,
  };
  return res;
}
function beep(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    const actx = new AC();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.12, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.35);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + 0.36);
    setTimeout(() => { try{ actx.close(); }catch(e){} }, 600);
  }catch(e){}
}
async function notifyUser(title, body){

    if(LN){
      try{ await LN.requestPermissions(); }catch(e){}

      await LN.schedule({ notifications:[{ id: notifyUser._id + 1, title, body }] });
      ok = true;
    }

  if(!ok){

        if(Notification.permission === 'granted'){ new Notification(title, { body }); ok = true; }
        else if(Notification.permission !== 'denied'){

        }
      }

  }
  try{ if(navigator.vibrate) navigator.vibrate([170, 80, 170]); }catch(e){}
  beep();

}

function fmtPrice(p, dec){
  if(p == null || !isFinite(p)) return '—';
  const d = (dec != null) ? dec : (Math.abs(p) >= 10 ? 2 : 4);
  return p.toFixed(d);
}
function fmtPct(v){
  if(v == null || !isFinite(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function fmtVol(v){
  if(!v) return '0';
  if(v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if(v >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if(v >= 1e3) return (v/1e3).toFixed(1) + 'k';
  return String(Math.round(v));
}
function pad2(n){ return n < 10 ? '0'+n : ''+n; }
function fmtTime(t, tfId){
  const d = new Date(t*1000);
  if(tfId === 'D1') return pad2(d.getDate()) + '.' + pad2(d.getMonth()+1);
  return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}
function fmtFull(t, tfId){
  const d = new Date(t*1000);
  const date = pad2(d.getDate()) + '.' + pad2(d.getMonth()+1) + '.' + d.getFullYear();
  if(tfId === 'D1') return date;
  return date + '  ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}
function fmtClock(dt){
  return pad2(dt.getHours()) + ':' + pad2(dt.getMinutes()) + ':' + pad2(dt.getSeconds());
}
function niceStep(range, ticks){
  const raw = range / Math.max(1, ticks);
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  const s = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
  return s * mag;
}

const CLR = {
  bg:'#051b21', grid:'rgba(159,226,214,.07)', axis:'#5f8480',
  up:'#2fd6ae', down:'#ff6b5e', txt:'#eef7f4', cross:'rgba(238,247,244,.45)',
};
const COUNT0 = 90;

function clampEnd(end, count, len){
  if(len <= 0) return end;
  const maxE = len - 1 + count * 0.15;
  const minE = Math.min(len - 1, Math.max(5, count * 0.4));
  return Math.max(minE, Math.min(maxE, end));
}

function ChartCanvas({ candles, emaData, emaVis, tfId, resetKey, hasVol, overlays, panels, markers, geoLines, patMap, focus, levels }){
  const wrapRef = useRef(null);
  const cvsRef  = useRef(null);
  const layoutRef = useRef(null);
  const pinnedRef = useRef(true);
  const gRef = useRef({ pts:new Map(), mode:null, sx:0, sEnd:0, sCount:0, sDist:0, sCenter:0, moved:false, t0:0 });
  const rafRef = useRef({ id:0, next:null });
  const scheduleView = useCallback((updater) => {
    rafRef.current.next = updater;
    if(rafRef.current.id) return;
    rafRef.current.id = requestAnimationFrame(() => {
      rafRef.current.id = 0;
      const fn = rafRef.current.next;
      rafRef.current.next = null;
      if(fn) setView(fn);
    });
  }, []);
  useEffect(() => () => { if(rafRef.current.id) cancelAnimationFrame(rafRef.current.id); }, []);
  const [size, setSize] = useState({ w:0, h:0 });
  const [view, setView] = useState({ count:COUNT0, end:COUNT0-1 });
  const [cross, setCross] = useState(null);
  const len = candles.length;
  const ovl = overlays || {};
  const pnl = panels || [];

  /* --- reset przy zmianie symbolu / TF --- */
  useEffect(() => {
    pinnedRef.current = true;
    setCross(null);
    setView({ count:COUNT0, end:COUNT0-1 });
  }, [resetKey]);

  /* --- fokus z listy formacji: ustaw krzyżyk i dosuń widok --- */
  useEffect(() => {
    if(!focus || !len) return;
    const idx = Math.min(len-1, Math.max(0, focus.idx));
    setCross(idx);
    pinnedRef.current = false;
    setView(v => {
      const ne = clampEnd(idx + Math.floor(v.count*0.3), v.count, len);
      return { ...v, end: ne };
    });
  }, [focus]);

  /* --- po dojściu nowych świec trzymaj prawą krawędź --- */
  useEffect(() => {
    if(pinnedRef.current && len){
      setView(v => ({ ...v, end: len - 1 + v.count * 0.08 }));
    }
    setCross(c => (c != null && c >= len) ? null : c);
  }, [candles]);

  /* --- rozmiar kontenera --- */
  useEffect(() => {
    const el = wrapRef.current;
    if(!el || !window.ResizeObserver) return;
    const ro = new ResizeObserver(es => {
      const r = es[0].contentRect;
      setSize({ w:Math.round(r.width), h:Math.round(r.height) });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  const idxFromX = useCallback((clientX) => {
    const L = layoutRef.current, cvs = cvsRef.current;
    if(!L || !cvs || !len) return null;
    const rect = cvs.getBoundingClientRect();
    const x = clientX - rect.left;
    let i = Math.round(L.start + (x - L.plotL) / L.cw - 0.5);
    if(i < 0) i = 0;
    if(i > len-1) i = len-1;
    return i;
  }, [len]);

  /* ------------------------- GESTY ------------------------- */
  const onPointerDown = (e) => {
    const g = gRef.current;
    try{ cvsRef.current.setPointerCapture(e.pointerId); }catch(err){}
    g.pts.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if(g.pts.size === 1){
      g.mode = 'pan'; g.sx = e.clientX; g.sEnd = view.end;
      g.moved = false; g.t0 = Date.now();
    } else if(g.pts.size === 2){
      const p = Array.from(g.pts.values());
      g.mode = 'pinch';
      g.sDist = Math.max(8, Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y));
      g.sCount = view.count;
      g.sCenter = view.end - view.count/2;
    }
  };
  const onPointerMove = (e) => {
    const g = gRef.current;
    if(!g.pts.has(e.pointerId)){
      if(e.pointerType === 'mouse' && len) setCross(idxFromX(e.clientX));
      return;
    }
    g.pts.set(e.pointerId, { x:e.clientX, y:e.clientY });
    const L = layoutRef.current;
    if(!L || !len) return;
    if(g.mode === 'pan' && g.pts.size === 1){
      const dx = e.clientX - g.sx;
      if(Math.abs(dx) > 5) g.moved = true;
      const newEnd = clampEnd(g.sEnd - dx / L.cw, view.count, len);
      pinnedRef.current = newEnd >= len - 1.5;
      scheduleView(v => ({ ...v, end:newEnd }));
    } else if(g.mode === 'pinch' && g.pts.size >= 2){
      const p = Array.from(g.pts.values());
      const d = Math.max(8, Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y));
      let nc = Math.round(g.sCount * (g.sDist / d));
      nc = Math.max(15, Math.min(400, nc));
      const ne = clampEnd(g.sCenter + nc/2, nc, len);
      pinnedRef.current = ne >= len - 1.5;
      scheduleView({ count:nc, end:ne });
    }
  };
  const onPointerUp = (e) => {
    const g = gRef.current;
    const was = g.pts.has(e.pointerId);
    g.pts.delete(e.pointerId);
    if(was && g.mode === 'pan' && !g.moved && (Date.now()-g.t0) < 350 && e.pointerType !== 'mouse' && len){
      const i = idxFromX(e.clientX);
      setCross(c => (c === i ? null : i));
    }
    if(g.pts.size === 1 && g.mode === 'pinch'){
      const rest = Array.from(g.pts.values())[0];
      g.mode = 'pan'; g.sx = rest.x; g.sEnd = view.end; g.moved = true; g.t0 = 0;
    } else if(g.pts.size === 0){
      g.mode = null;
    }
  };
  const onPointerLeave = (e) => {
    if(e.pointerType === 'mouse' && !gRef.current.pts.size) setCross(null);
  };

  /* --- kółko myszy (podgląd desktop) + dwuklik --- */
  useEffect(() => {
    const cvs = cvsRef.current;
    if(!cvs) return;
    const onWheel = (e) => {
      e.preventDefault();
      const L = layoutRef.current;
      if(!L || !len) return;
      const rect = cvs.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const idxAt = L.start + (x - L.plotL) / L.cw - 0.5;
      setView(v => {
        let nc = Math.round(v.count * (e.deltaY > 0 ? 1.18 : 0.85));
        nc = Math.max(15, Math.min(400, nc));
        const cw2 = L.plotW / nc;
        const ne = clampEnd(idxAt + 0.5 - (x - L.plotL)/cw2 + nc - 1, nc, len);
        pinnedRef.current = ne >= len - 1.5;
        return { count:nc, end:ne };
      });
    };
    const onDbl = () => {
      pinnedRef.current = true;
      setView({ count:COUNT0, end: len ? len-1+COUNT0*0.08 : COUNT0-1 });
    };
    cvs.addEventListener('wheel', onWheel, { passive:false });
    cvs.addEventListener('dblclick', onDbl);
    return () => { cvs.removeEventListener('wheel', onWheel); cvs.removeEventListener('dblclick', onDbl); };
  }, [len]);

  /* ------------------------- RYSOWANIE ------------------------- */
  useEffect(() => {
    const cvs = cvsRef.current;
    if(!cvs || !size.w || !size.h) return;
    const dpr = window.devicePixelRatio || 1;
    cvs.width = size.w * dpr; cvs.height = size.h * dpr;
    const ctx = cvs.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = CLR.bg;
    ctx.fillRect(0, 0, size.w, size.h);
    if(!len) return;

    const count = view.count;
    const end = clampEnd(view.end, count, len);
    const start = end - count + 1;
    const iFrom = Math.max(0, Math.floor(start));
    const iTo   = Math.min(len-1, Math.ceil(end));
    if(iTo < iFrom) return;

    /* zakres cen z widocznych świec + widocznych nakładek */
    let lo = Infinity, hi = -Infinity;
    const scan = arr => {
      if(!arr) return;
      for(let i=iFrom;i<=iTo;i++){
        const v = arr[i];
        if(v == null) continue;
        if(v < lo) lo = v;
        if(v > hi) hi = v;
      }
    };
    for(let i=iFrom;i<=iTo;i++){
      const c = candles[i];
      if(c.l < lo) lo = c.l;
      if(c.h > hi) hi = c.h;
    }
    for(let d=0;d<EMA_DEFS.length;d++){
      if(emaVis[EMA_DEFS[d].n]) scan(emaData[EMA_DEFS[d].n]);
    }
    if(ovl.boll){ scan(ovl.boll.up); scan(ovl.boll.dn); }
    if(ovl.vwap) scan(ovl.vwap);
    if(levels){
      for(let q=0;q<levels.length;q++){
        const p = levels[q].p;
        if(p < lo) lo = p;
        if(p > hi) hi = p;
      }
    }
    if(!isFinite(lo) || !isFinite(hi)) return;
    let pad = (hi - lo) * 0.07;
    if(pad <= 0) pad = Math.max(Math.abs(hi) * 0.002, 0.5);
    lo -= pad; hi += pad;
    const range = hi - lo;

    /* osie / layout */
    const step = niceStep(range, 5);
    const dec = step >= 1 ? 0 : Math.min(4, Math.ceil(-Math.log10(step)));
    ctx.font = '10px JetBrains Mono, monospace';
    let axisW = 50;
    for(let v = Math.ceil(lo/step)*step; v <= hi; v += step){
      const w = ctx.measureText(v.toFixed(dec)).width;
      if(w + 16 > axisW) axisW = w + 16;
    }
    const lastC = candles[len-1];
    axisW = Math.max(axisW, ctx.measureText(fmtPrice(lastC.c, dec)).width + 16);

    const plotL = 6;
    const plotR = size.w - axisW;
    const plotW = Math.max(10, plotR - plotL);
    const timeH = 20;
    const priceTop = 4;
    const nP = pnl.length;
    const panelH = nP ? Math.max(46, Math.min(76, Math.floor((size.h - timeH) * (nP === 1 ? 0.18 : 0.155)))) : 0;
    const panelsBlock = nP * (panelH + 4);
    const availA = size.h - timeH - priceTop - panelsBlock;
    const gapV = hasVol ? 6 : 0;
    const volH = hasVol ? Math.max(22, Math.floor(availA * 0.16)) : 0;
    const priceH = Math.max(60, availA - volH - gapV);
    const priceBottom = priceTop + priceH;
    const volBottom = priceBottom + gapV + volH;
    const bottomAll = volBottom + panelsBlock;
    const cw = plotW / count;
    const bw = Math.min(23, Math.max(1, cw * 0.62));
    const X = (i) => plotL + (i - start) * cw + cw/2;
    const Y = (p) => priceTop + (hi - p) / range * priceH;

    layoutRef.current = { start, cw, plotL, plotW };

    /* siatka pozioma + etykiety cen */
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    for(let v = Math.ceil(lo/step)*step; v <= hi; v += step){
      const y = Y(v);
      ctx.strokeStyle = CLR.grid; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
      ctx.fillStyle = CLR.axis;
      ctx.fillText(v.toFixed(dec), plotR + 7, y);
    }

    /* siatka pionowa + etykiety czasu */
    const tStep = Math.max(1, Math.round(count / 5));
    ctx.textAlign = 'center';
    for(let i = iTo; i >= iFrom; i -= tStep){
      const x = X(i);
      if(x < plotL || x > plotR) continue;
      ctx.strokeStyle = CLR.grid;
      ctx.beginPath(); ctx.moveTo(x, priceTop); ctx.lineTo(x, bottomAll); ctx.stroke();
      ctx.fillStyle = CLR.axis;
      ctx.font = '9.5px JetBrains Mono, monospace';
      ctx.fillText(fmtTime(candles[i].t, tfId), x, size.h - 9);
    }

    /* strefy S/R (pod świecami) */
    if(ovl.sr && ovl.sr.length){
      for(let z=0;z<ovl.sr.length;z++){
        const s = ovl.sr[z];
        if(s.hi < lo || s.lo > hi) continue;
        const y1 = Y(Math.min(hi, s.hi));
        const y2 = Y(Math.max(lo, s.lo));
        const alpha = Math.min(0.16, 0.05 + s.touches * 0.018);
        ctx.fillStyle = 'rgba(79,216,255,' + alpha.toFixed(3) + ')';
        ctx.fillRect(plotL, y1, plotW, Math.max(2, y2 - y1));
        ctx.strokeStyle = 'rgba(79,216,255,.28)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(plotL, y1); ctx.lineTo(plotR, y1);
        ctx.moveTo(plotL, y2); ctx.lineTo(plotR, y2);
        ctx.stroke();
      }
    }

    /* wolumen */
    if(hasVol && volH > 4){
      let vmax = 0;
      for(let i=iFrom;i<=iTo;i++) if(candles[i].v > vmax) vmax = candles[i].v;
      if(vmax > 0){
        for(let i=iFrom;i<=iTo;i++){
          const c = candles[i];
          if(!c.v) continue;
          const h = Math.max(1, (c.v / vmax) * (volH - 3));
          ctx.fillStyle = c.c >= c.o ? 'rgba(47,214,174,.40)' : 'rgba(255,107,94,.40)';
          ctx.fillRect(X(i) - bw/2, volBottom - h, bw, h);
        }
      }
      ctx.strokeStyle = CLR.grid;
      ctx.beginPath(); ctx.moveTo(plotL, volBottom + .5); ctx.lineTo(plotR, volBottom + .5); ctx.stroke();
    }

    /* świece */
    for(let i=iFrom;i<=iTo;i++){
      const c = candles[i];
      const up = c.c >= c.o;
      const col = up ? CLR.up : CLR.down;
      const x = X(i);
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, Y(c.h)); ctx.lineTo(x, Y(c.l)); ctx.stroke();
      const yO = Y(c.o), yC = Y(c.c);
      const top = Math.min(yO, yC);
      const hgt = Math.max(1, Math.abs(yO - yC));
      ctx.fillStyle = col;
      ctx.fillRect(x - bw/2, top, bw, hgt);
    }

    /* pomocnik: linia z serii (nulle przerywają ścieżkę) */
    const strokeSeries = (arr, color, lw, yFn, dash) => {
      if(!arr) return;
      ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineJoin = 'round';
      if(dash) ctx.setLineDash(dash);
      ctx.beginPath();
      let started = false;
      for(let i=iFrom;i<=iTo;i++){
        const v = arr[i];
        if(v == null){ started = false; continue; }
        const x = X(i), y = yFn(v);
        if(started) ctx.lineTo(x, y);
        else { ctx.moveTo(x, y); started = true; }
      }
      ctx.stroke();
      if(dash) ctx.setLineDash([]);
    };

    /* Bollinger */
    if(ovl.boll){
      strokeSeries(ovl.boll.up, 'rgba(159,226,214,.55)', 1, Y);
      strokeSeries(ovl.boll.dn, 'rgba(159,226,214,.55)', 1, Y);
      strokeSeries(ovl.boll.mid, 'rgba(159,226,214,.55)', 1, Y, [3,3]);
    }
    /* VWAP */
    if(ovl.vwap) strokeSeries(ovl.vwap, '#ff5fa2', 1.6, Y);

    /* linie EMA */
    for(let d=0;d<EMA_DEFS.length;d++){
      const def = EMA_DEFS[d];
      if(!emaVis[def.n]) continue;
      strokeSeries(emaData[def.n], def.color, 1.6, Y);
    }

    /* ostatnia cena — przerywana linia + etykieta na osi */
    const lc = lastC;
    if(lc.c >= lo && lc.c <= hi){
      const y = Y(lc.c);
      const upNow = len > 1 ? lc.c >= candles[len-2].c : lc.c >= lc.o;
      const col = upNow ? CLR.up : CLR.down;
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
      ctx.setLineDash([]);
      const txt = fmtPrice(lc.c, dec);
      ctx.font = '10px JetBrains Mono, monospace';
      const tw = ctx.measureText(txt).width;
      ctx.fillStyle = col;
      const bx = plotR + 2, by = y - 9;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(bx, by, tw + 12, 18, 4); else ctx.rect(bx, by, tw + 12, 18);
      ctx.fill();
      ctx.fillStyle = '#04181d';
      ctx.textAlign = 'left';
      ctx.fillText(txt, bx + 6, y);
    }

    /* poziomy sygnału: ENTRY / SL / TP */
    if(levels){
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.textBaseline = 'middle';
      for(let q=0;q<levels.length;q++){
        const Lv = levels[q];
        if(Lv.p < lo || Lv.p > hi) continue;
        const y = Y(Lv.p);
        ctx.strokeStyle = Lv.color; ctx.lineWidth = 1;
        ctx.setLineDash([2,4]);
        ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
        ctx.setLineDash([]);
        const tw2 = ctx.measureText(Lv.label).width;
        ctx.fillStyle = Lv.color;
        ctx.fillRect(plotL + 4, y - 7, tw2 + 8, 14);
        ctx.fillStyle = '#04181d';
        ctx.textAlign = 'left';
        ctx.fillText(Lv.label, plotL + 8, y);
      }
      ctx.font = '10px JetBrains Mono, monospace';
    }

    /* ------------------- PANELE WSKAŹNIKÓW ------------------- */
    const vIdx = (cross != null && cross >= iFrom && cross <= iTo) ? cross : iTo;
    const fmtPV = v => {
      if(v == null) return '—';
      const a = Math.abs(v);
      if(a >= 1e6) return fmtVol(v);
      if(a >= 100) return v.toFixed(1);
      return v.toFixed(2);
    };
    for(let pi=0;pi<nP;pi++){
      const P = pnl[pi];
      const top = volBottom + 4 + pi*(panelH + 4);
      const bot = top + panelH;
      ctx.fillStyle = 'rgba(159,226,214,.03)';
      ctx.fillRect(plotL, top, plotW, panelH);
      ctx.strokeStyle = CLR.grid; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(plotL, top + .5); ctx.lineTo(plotR, top + .5); ctx.stroke();

      let plo = 0, phi = 100, fixed = true;
      if(P.kind === 'macd' || P.kind === 'line'){
        fixed = false; plo = Infinity; phi = -Infinity;
        const scanP = arr => {
          if(!arr) return;
          for(let i=iFrom;i<=iTo;i++){
            const v = arr[i];
            if(v == null) continue;
            if(v < plo) plo = v;
            if(v > phi) phi = v;
          }
        };
        if(P.kind === 'macd'){ scanP(P.m); scanP(P.s); scanP(P.h); if(plo > 0) plo = 0; if(phi < 0) phi = 0; }
        else scanP(P.a);
        if(!isFinite(plo) || !isFinite(phi)){ plo = 0; phi = 1; }
        let pp = (phi - plo) * 0.1;
        if(pp <= 0) pp = Math.max(Math.abs(phi)*0.05, 0.001);
        plo -= pp; phi += pp;
      }
      const yP = v => bot - 4 - (v - plo)/(phi - plo) * (panelH - 12);
      const level = (v, dash) => {
        if(v < plo || v > phi) return;
        ctx.strokeStyle = 'rgba(143,176,172,.30)'; ctx.lineWidth = 1;
        ctx.setLineDash(dash || [3,3]);
        ctx.beginPath(); ctx.moveTo(plotL, yP(v)); ctx.lineTo(plotR, yP(v)); ctx.stroke();
        ctx.setLineDash([]);
      };
      let valTxt = '';
      if(P.kind === 'rsi'){
        level(30); level(70);
        strokeSeries(P.a, '#4fd8ff', 1.5, yP);
        valTxt = fmtPV(P.a[vIdx]);
      } else if(P.kind === 'stoch'){
        level(20); level(80);
        strokeSeries(P.k, '#4fd8ff', 1.4, yP);
        strokeSeries(P.d, '#ffc94d', 1.4, yP);
        valTxt = '%K ' + fmtPV(P.k[vIdx]) + '  %D ' + fmtPV(P.d[vIdx]);
      } else if(P.kind === 'adx'){
        level(25);
        strokeSeries(P.pdi, CLR.up, 1.2, yP);
        strokeSeries(P.mdi, CLR.down, 1.2, yP);
        strokeSeries(P.adx, '#eef7f4', 1.6, yP);
        valTxt = fmtPV(P.adx[vIdx]) + '  +DI ' + fmtPV(P.pdi[vIdx]) + '  −DI ' + fmtPV(P.mdi[vIdx]);
      } else if(P.kind === 'macd'){
        const y0 = yP(0);
        for(let i=iFrom;i<=iTo;i++){
          const v = P.h[i];
          if(v == null) continue;
          ctx.fillStyle = v >= 0 ? 'rgba(47,214,174,.5)' : 'rgba(255,107,94,.5)';
          const yv = yP(v);
          ctx.fillRect(X(i) - bw*0.4, Math.min(y0, yv), bw*0.8, Math.max(1, Math.abs(yv - y0)));
        }
        level(0, [2,3]);
        strokeSeries(P.m, '#4fd8ff', 1.4, yP);
        strokeSeries(P.s, '#ffc94d', 1.4, yP);
        valTxt = fmtPV(P.m[vIdx]) + '  S ' + fmtPV(P.s[vIdx]) + '  H ' + fmtPV(P.h[vIdx]);
      } else if(P.kind === 'line'){
        strokeSeries(P.a, P.color || '#c792ff', 1.5, yP);
        valTxt = P.fmt ? (P.a[vIdx] == null ? '—' : P.fmt(P.a[vIdx])) : fmtPV(P.a[vIdx]);
      }
      ctx.font = '9.5px JetBrains Mono, monospace';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillStyle = CLR.axis;
      ctx.fillText(P.id, plotL + 6, top + 10);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#cfe4e0';
      ctx.fillText(valTxt, plotR - 6, top + 10);
      ctx.textAlign = 'left';
    }

    /* znaczniki formacji + linie formacji geometrycznych */
    if(markers || (geoLines && geoLines.length)){
      ctx.save();
      ctx.beginPath(); ctx.rect(plotL, 0, plotW, bottomAll); ctx.clip();
      if(markers){
        for(let i=iFrom;i<=iTo;i++){
          const mk = markers[i];
          if(!mk) continue;
          const c = candles[i], x = X(i);
          if(mk.dir > 0){
            const y = Y(c.l) + 7;
            ctx.fillStyle = CLR.up;
            ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x-4.5, y+7); ctx.lineTo(x+4.5, y+7); ctx.closePath(); ctx.fill();
          } else if(mk.dir < 0){
            const y = Y(c.h) - 7;
            ctx.fillStyle = CLR.down;
            ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x-4.5, y-7); ctx.lineTo(x+4.5, y-7); ctx.closePath(); ctx.fill();
          } else {
            const y = Y(c.h) - 10;
            ctx.fillStyle = 'rgba(143,176,172,.85)';
            ctx.beginPath(); ctx.moveTo(x, y-4); ctx.lineTo(x+4, y); ctx.lineTo(x, y+4); ctx.lineTo(x-4, y); ctx.closePath(); ctx.fill();
          }
        }
      }
      if(geoLines){
        for(let g=0;g<geoLines.length;g++){
          const gp = geoLines[g];
          const col = gp.dir > 0 ? 'rgba(47,214,174,.75)' : gp.dir < 0 ? 'rgba(255,107,94,.75)' : 'rgba(79,216,255,.75)';
          ctx.strokeStyle = col; ctx.lineWidth = 1.3;
          ctx.setLineDash([6,4]);
          for(let q=0;q<gp.lines.length;q++){
            const L2 = gp.lines[q];
            ctx.beginPath();
            ctx.moveTo(X(L2.i0), Y(L2.p0));
            ctx.lineTo(X(L2.i1), Y(L2.p1));
            ctx.stroke();
          }
          ctx.setLineDash([]);
        }
      }
      ctx.restore();
    }

    /* krzyżyk (crosshair) */
    if(cross != null && cross >= iFrom && cross <= iTo){
      const c = candles[cross];
      const x = X(cross), y = Y(Math.min(hi, Math.max(lo, c.c)));
      ctx.strokeStyle = CLR.cross; ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(x, priceTop); ctx.lineTo(x, bottomAll); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(plotL, y); ctx.lineTo(plotR, y); ctx.stroke();
      ctx.setLineDash([]);
      const txt = fmtPrice(c.c, dec);
      ctx.font = '10px JetBrains Mono, monospace';
      const tw = ctx.measureText(txt).width;
      ctx.fillStyle = '#2a4a53';
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(plotR + 2, y - 9, tw + 12, 18, 4); else ctx.rect(plotR + 2, y - 9, tw + 12, 18);
      ctx.fill();
      ctx.fillStyle = CLR.txt; ctx.textAlign = 'left';
      ctx.fillText(txt, plotR + 8, y);
    }
  }, [candles, view, cross, emaVis, size, tfId, hasVol, len, overlays, panels, markers, geoLines, levels]);

  /* --- panel OHLC dla krzyżyka --- */
  const cc = (cross != null && cross < len) ? candles[cross] : null;
  const prevC = (cross != null && cross > 0) ? candles[cross-1].c : (cc ? cc.o : null);
  const showReset = len > 0 && view.end < len - 2;

  const extras = [];
  if(cc){
    const i = cross;
    if(patMap && patMap[i]){
      patMap[i].forEach(p => extras.push((p.dir > 0 ? '▲ ' : p.dir < 0 ? '▼ ' : '◆ ') + p.name + ' ' + p.conf + '%'));
    }
    const f2 = v => v == null ? '—' : (Math.abs(v) >= 100 ? v.toFixed(1) : v.toFixed(2));
    if(ovl.boll && ovl.boll.mid[i] != null){
      extras.push('BB ' + fmtPrice(ovl.boll.dn[i]) + ' / ' + fmtPrice(ovl.boll.mid[i]) + ' / ' + fmtPrice(ovl.boll.up[i]));
    }
    if(ovl.vwap && ovl.vwap[i] != null) extras.push('VWAP ' + fmtPrice(ovl.vwap[i]));
    for(let p=0;p<pnl.length;p++){
      const P = pnl[p];
      if(P.kind === 'rsi' && P.a[i] != null) extras.push('RSI ' + P.a[i].toFixed(1));
      else if(P.kind === 'macd' && P.m[i] != null) extras.push('MACD ' + f2(P.m[i]) + ' · S ' + f2(P.s[i]) + ' · H ' + f2(P.h[i]));
      else if(P.kind === 'stoch' && P.k[i] != null) extras.push('ST %K ' + P.k[i].toFixed(0) + ' %D ' + (P.d[i] != null ? P.d[i].toFixed(0) : '—'));
      else if(P.kind === 'adx' && P.adx[i] != null) extras.push('ADX ' + P.adx[i].toFixed(0) + ' (+DI ' + f2(P.pdi[i]) + ' −DI ' + f2(P.mdi[i]) + ')');
      else if(P.kind === 'line' && P.a[i] != null) extras.push(P.id + ' ' + (P.fmt ? P.fmt(P.a[i]) : f2(P.a[i])));
    }
  }

  return (
    <div className="chartwrap" ref={wrapRef}>
      <canvas
        ref={cvsRef}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}

            H <b style={{color:'var(--up)'}}>{fmtPrice(cc.h)}</b>{'  '}
            L <b style={{color:'var(--down)'}}>{fmtPrice(cc.l)}</b>{'  '}
            C <b style={{color: cc.c >= cc.o ? 'var(--up)' : 'var(--down)'}}>{fmtPrice(cc.c)}</b>
          </div>
          <div style={{color:'var(--dim)'}}>
            Δ {prevC ? fmtPct((cc.c - prevC)/prevC*100) : '—'}
            {cc.v ? '   Vol ' + fmtVol(cc.v) : ''}
          </div>
          <div>
            {EMA_DEFS.filter(d => emaVis[d.n] && emaData[d.n] && emaData[d.n][cross] != null).map(d => (
              <span key={d.n} style={{marginRight:8}}>

                <span style={{color:'var(--dim)'}}> {d.n}:</span> {fmtPrice(emaData[d.n][cross])}
              </span>
            ))}
          </div>
          {extras.length > 0 && (
            <div style={{color:'var(--dim)', fontSize:10.5, marginTop:2}}>{extras.join('  ·  ')}</div>
          )}
        </div>
      )}
      {showReset && (
        <button className="resetview mono" onClick={() => {
          pinnedRef.current = true;
          setView(v => ({ ...v, end: len - 1 + v.count * 0.08 }));
        }}>⇥ Teraz</button>
      )}
    </div>
  );
}

function Sparkline({ data, up }){
  const ref = useRef(null);
  useEffect(() => {
    const cvs = ref.current;
    if(!cvs || !data || data.length < 2) return;
    const W = 72, H = 30, dpr = window.devicePixelRatio || 1;
    cvs.width = W*dpr; cvs.height = H*dpr;
    const ctx = cvs.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);
    let lo = Infinity, hi = -Infinity;
    for(let i=0;i<data.length;i++){ if(data[i]<lo) lo=data[i]; if(data[i]>hi) hi=data[i]; }
    if(hi - lo <= 0){ hi = lo + 1; }
    const x = i => 2 + i/(data.length-1) * (W-4);
    const y = v => 3 + (hi - v)/(hi - lo) * (H-6);
    const col = up ? '#2fd6ae' : '#ff6b5e';
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
    ctx.beginPath();
    for(let i=0;i<data.length;i++){
      if(i === 0) ctx.moveTo(x(i), y(data[i]));
      else ctx.lineTo(x(i), y(data[i]));
    }
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x(data.length-1), y(data[data.length-1]), 2, 0, Math.PI*2);
    ctx.fill();
  }, [data, up]);
  return <canvas ref={ref} style={{width:72, height:30, flexShrink:0}} />;
}

  useEffect(() => () => { aliveRef.current = false; }, []);
